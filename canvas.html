<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tmux 노드 캔버스</title>
<style>
:root{
  --bg-0:#0d0d14;--bg-1:#13131f;--bg-2:#1a1a2e;--bg-3:#222236;--bg-4:#2a2a3e;
  --border:#333355;--border-light:#444466;
  --text:#e0e0e0;--text-dim:#888899;--text-muted:#666677;
  --accent:#4CAF50;--accent-hover:#66BB6A;
  --blue:#2196F3;--blue-dim:#1565C0;--orange:#FF9800;--red:#F44336;--purple:#8B5CF6;--cyan:#06B6D4;--amber:#F59E0B;
  --radius:8px;--radius-sm:4px;
  --mono:'Consolas','D2Coding',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg-0);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.nav{display:flex;background:var(--bg-2);border-bottom:1px solid var(--border);flex-shrink:0}
.nav a{color:var(--text-dim);text-decoration:none;padding:10px 20px;font-size:.85em;border-bottom:2px solid transparent;transition:.15s}
.nav a:hover{color:var(--text);background:var(--bg-3)}.nav a.active{color:var(--accent);border-bottom-color:var(--accent)}
.tb{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg-1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tb button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:.78em;transition:.15s}
.tb button:hover{background:var(--bg-4);border-color:var(--border-light)}
.tb .act{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.tb .danger{background:rgba(244,67,54,.15);color:var(--red);border-color:rgba(244,67,54,.3)}
.tb select,.tb input{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:3px 6px;border-radius:var(--radius-sm);font-size:.78em}
.tb .sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.tb .lbl{font-size:.72em;color:var(--text-muted)}
.main{display:flex;flex:1;overflow:hidden}
.cw{flex:1;overflow:hidden;position:relative;cursor:grab;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px}
.cw.grabbing{cursor:grabbing}.cw.connecting{cursor:crosshair}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
#svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#svg path{pointer-events:stroke;cursor:pointer}
.conn{stroke:#7ecfff;stroke-width:2;fill:none;stroke-dasharray:8 4;animation:flowDash 1s linear infinite;opacity:.55;transition:opacity .2s,stroke-width .15s}
.conn:hover{stroke:#ff6b6b;stroke-width:3;opacity:.9;filter:drop-shadow(0 0 6px rgba(255,107,107,.5))}
.conn.active{stroke:#7eff8e;opacity:.8;stroke-width:2.5}
.conn.sel{stroke:#ff5252;stroke-width:3;opacity:.9;animation:none}
.conn-temp{stroke:var(--blue);stroke-width:2;fill:none;stroke-dasharray:6 3;pointer-events:none}
@keyframes flowDash{to{stroke-dashoffset:-24}}
/* NODE */
.nd{position:absolute;width:280px;height:240px;display:flex;flex-direction:column;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg-1);box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:3;overflow:visible}
.nd > .nd-hd, .nd > .nd-body{overflow:hidden}
.nd > .nd-hd{border-radius:var(--radius) var(--radius) 0 0}
.nd > .nd-body{border-radius:0 0 var(--radius) var(--radius)}
.nd:hover{box-shadow:0 4px 16px rgba(0,0,0,.5)}
.nd.sel{border-color:var(--accent)!important;box-shadow:0 0 12px rgba(76,175,80,.4)}
.nd.multi-sel{border-color:var(--blue)!important;box-shadow:0 0 8px rgba(33,150,243,.4)}
.nd.running{animation:busyGlow 1.5s ease-in-out infinite}
.nd.complete{border-color:var(--accent)}
.nd.error{border-color:var(--red)!important;animation:errorPulse 2s ease-in-out infinite}
@keyframes busyGlow{0%,100%{box-shadow:0 0 8px rgba(33,150,243,.3)}50%{box-shadow:0 0 20px rgba(33,150,243,.7),0 0 40px rgba(33,150,243,.3)}}
@keyframes errorPulse{0%,100%{box-shadow:0 0 8px rgba(244,67,54,.4)}50%{box-shadow:0 0 20px rgba(244,67,54,.8)}}
.nd[data-type="agent"]{border-color:#3B82F6}.nd[data-type="agent"] .nd-hd{background:rgba(59,130,246,.12)}
.nd[data-type="memo"]{border-color:#F59E0B}.nd[data-type="memo"] .nd-hd{background:rgba(245,158,11,.12)}
.nd[data-type="input"]{border-color:#06B6D4}.nd[data-type="input"] .nd-hd{background:rgba(6,182,212,.12)}
.nd[data-type="trigger"]{border-color:#EF4444}.nd[data-type="trigger"] .nd-hd{background:rgba(239,68,68,.12)}
/* CUSTOM IMAGE BACKGROUND (노드 외형 이미지화) */
.nd.has-bg-img{background-size:cover;background-position:center;background-repeat:no-repeat}
.nd.has-bg-img .nd-hd{background:rgba(0,0,0,.65)!important;backdrop-filter:blur(4px)}
.nd.has-bg-img .nd-body{background:rgba(13,13,20,.55)!important;backdrop-filter:blur(2px)}
.nd.has-bg-img .nd-in textarea,.nd.has-bg-img .nd-out{background:transparent}
.nd.collapsed.has-bg-img .coll-body{background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border-radius:14px}
/* COLLAPSED */
.nd.collapsed{width:auto!important;height:auto!important;min-width:80px;max-width:160px;min-height:0!important;overflow:visible!important;border-radius:10px;padding:0;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.nd.collapsed .nd-hd,.nd.collapsed .nd-body{display:none!important}
.nd.collapsed .coll-body{display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:grab}
.nd:not(.collapsed) .coll-body{display:none}
.coll-icon{font-size:16px;line-height:1}
.coll-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.nd.collapsed[data-type="agent"]{background:linear-gradient(135deg,#0f1a2e,#1a1a2e);border-color:#3B82F6}
.nd.collapsed[data-type="agent"] .coll-badge{background:rgba(59,130,246,.25);color:#3B82F6}
.nd.collapsed[data-type="memo"]{background:linear-gradient(135deg,#2a2210,#1a1a2e);border-color:#F59E0B}
.nd.collapsed[data-type="memo"] .coll-badge{background:rgba(245,158,11,.25);color:#F59E0B}
.nd.collapsed[data-type="input"]{background:linear-gradient(135deg,#0a1a20,#1a1a2e);border-color:#06B6D4}
.nd.collapsed[data-type="input"] .coll-badge{background:rgba(6,182,212,.25);color:#06B6D4}
.nd.collapsed[data-type="trigger"]{background:linear-gradient(135deg,#2a0a0a,#1a1a2e);border-color:#EF4444}
.nd.collapsed[data-type="trigger"] .coll-badge{background:rgba(239,68,68,.25);color:#EF4444}
/* HEADER */
.nd-hd{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--border);flex-shrink:0;cursor:grab;user-select:none;font-size:12px}
.nd-hd:active{cursor:grabbing}
.nd-icon{font-size:14px}
.nd-name{flex:1;font-size:11px;font-weight:600;color:var(--text);background:transparent;border:none;outline:none;padding:1px 3px;border-radius:var(--radius-sm);min-width:30px}
.nd-name:focus{background:var(--bg-3);color:var(--accent)}
.nd-ctrls{display:flex;gap:1px}
.nd-ctrls button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:10px;padding:2px 4px;border-radius:3px;transition:.15s}
.nd-ctrls button:hover{color:var(--text);background:var(--bg-3)}
.nd-ctrls .run-btn{color:var(--accent)}.nd-ctrls .run-btn:hover{background:rgba(76,175,80,.2)}
.nd-st{width:7px;height:7px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.nd-st.running{background:var(--blue);animation:pulse 1s infinite}.nd-st.complete{background:var(--accent)}.nd-st.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* BODY */
.nd-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.sec-lbl{font-size:9px;color:var(--text-muted);padding:3px 8px 1px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.nd-in{flex-shrink:0}.nd-in textarea{width:100%;background:var(--bg-0);color:var(--text);border:none;padding:4px 8px;font-family:var(--mono);font-size:11px;resize:none;height:60px;outline:none;line-height:1.4}
.nd-div{height:3px;background:var(--bg-3);cursor:ns-resize;flex-shrink:0;transition:.15s}.nd-div:hover{background:var(--accent)}
.nd-out{flex:1;overflow-y:auto;background:var(--bg-0);border-radius:0 0 calc(var(--radius) - 2px) calc(var(--radius) - 2px)}
.out-c{padding:4px 8px;font-family:var(--mono);font-size:11px;white-space:pre-wrap;word-break:break-word;color:var(--text-dim);line-height:1.4}
/* NODE RESIZE */
.nd-resize{position:absolute;right:0;bottom:0;width:12px;height:12px;cursor:nwse-resize;z-index:4}
.nd-resize::after{content:'';position:absolute;right:3px;bottom:3px;width:6px;height:6px;border-right:2px solid var(--text-muted);border-bottom:2px solid var(--text-muted)}
/* PORTS */
.port{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:var(--bg-1);cursor:crosshair;z-index:10;transition:transform .12s,background .12s,box-shadow .12s}
.port:hover,.port.near{background:var(--accent);transform:scale(2.2);box-shadow:0 0 12px rgba(76,175,80,.6)}
.port.near-far{transform:scale(1.4)}
.port-l{left:-14px;top:50%;margin-top:-7px}
.port-r{right:-14px;top:50%;margin-top:-7px}
.nd.collapsed .port-l{left:-16px}.nd.collapsed .port-r{right:-16px}
/* SIDEBAR */
.sb{width:360px;min-width:240px;border-left:1px solid var(--border);background:var(--bg-1);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:4;position:relative}
.sb.hid{display:none}
.sb-resize{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;transition:.15s}.sb-resize:hover{background:var(--accent);opacity:.5}
.sb-hd{display:flex;align-items:center;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg-2);flex-shrink:0}
.sb-hd h3{flex:1;font-size:.85em;color:var(--accent);font-weight:600}.sb-hd button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:3px}.sb-hd button:hover{color:var(--text);background:var(--bg-3)}
.sb-ct{flex:1;overflow-y:auto;padding:8px}
.sb-sec{margin-bottom:10px}
.sb-sec label{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.sb-sec label button{background:var(--bg-3);border:1px solid var(--border);color:var(--blue);cursor:pointer;font-size:11px;padding:4px 12px;border-radius:var(--radius-sm);transition:.15s}.sb-sec label button:hover{background:var(--bg-4);color:var(--accent)}
.sb-sec textarea,.sb-sec .ov{width:100%;background:var(--bg-0);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px;font-family:var(--mono);font-size:11px;resize:vertical;min-height:60px;line-height:1.4}
.sb-sec textarea:focus{outline:none;border-color:var(--accent)}
.sb-sec .ov{max-height:250px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.sb-sec select,.sb-sec input[type=text]{width:100%;background:var(--bg-0);color:var(--text);border:1px solid var(--border);padding:5px 6px;border-radius:var(--radius-sm);font-size:11px}
.sb-sec input:focus,.sb-sec select:focus{outline:none;border-color:var(--accent)}
.sb-row{display:flex;gap:4px;margin-bottom:8px}
.sb-row button{flex:1;padding:6px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:.78em;transition:.15s}
.sb-row .r{background:var(--accent);color:#000}.sb-row .r:hover{background:var(--accent-hover)}
.sb-row .s{background:rgba(244,67,54,.15);color:var(--red)}.sb-row .s:hover{background:rgba(244,67,54,.3)}
.tsz{display:flex;align-items:center;gap:3px}.tsz button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:2px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:.78em}.tsz button:hover{background:var(--bg-4)}
/* CONTEXT MENU */
#ctx{position:fixed;background:var(--bg-2);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:1000;min-width:200px;padding:4px 0;display:none}
#ctx.show{display:block}
.ctx-item{padding:7px 14px;font-size:12px;color:var(--text);cursor:pointer;transition:.1s;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:var(--bg-4);color:#fff}
.ctx-item.danger{color:var(--red)}.ctx-item.danger:hover{background:rgba(244,67,54,.2)}
.ctx-sep{height:1px;background:var(--border);margin:4px 8px}
/* ARRANGE POPUP */
#arr-pop{position:fixed;background:var(--bg-2);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:1001;padding:12px 16px;display:none;min-width:220px}
#arr-pop.show{display:block}
#arr-pop label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);margin-bottom:8px}
#arr-pop input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
#arr-pop .arr-val{font-size:11px;color:var(--accent);min-width:32px;text-align:right;font-family:var(--mono)}
#arr-pop .arr-title{font-size:11px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
/* MODAL */
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;display:none;justify-content:center;align-items:center}
.mo.show{display:flex}
.mo-box{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);width:85vw;height:82vh;display:flex;flex-direction:column}
.mo-hd{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.mo-hd h3{color:var(--accent);font-size:.9em}.mo-hd button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:4px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:.8em}.mo-hd button:hover{background:var(--red)}
.mo-body{flex:1;overflow-y:auto;padding:14px}
.mo-body textarea{width:100%;height:100%;background:var(--bg-0);color:var(--text);border:none;font-family:var(--mono);font-size:13px;line-height:1.6;resize:none;outline:none;padding:10px}
.mo-body pre{font-family:var(--mono);white-space:pre-wrap;word-break:break-all;line-height:1.6;font-size:13px}
.mo-body .rendered{font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.8;color:var(--text);padding:10px}
.mo-body .rendered *{max-width:100%}
.mo-body .rendered h1,.mo-body .rendered h2,.mo-body .rendered h3{color:var(--accent);margin:1em 0 .5em;border-bottom:1px solid var(--border);padding-bottom:.3em}
.mo-body .rendered code{background:var(--bg-3);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:.9em}
.mo-body .rendered pre{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:12px;overflow-x:auto;margin:1em 0}
.mo-body .rendered pre code{background:none;padding:0}
.mo-body .rendered blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:1em 0;color:var(--text-dim)}
.mo-body .rendered table{border-collapse:collapse;margin:1em 0;width:100%}
.mo-body .rendered th,.mo-body .rendered td{border:1px solid var(--border);padding:6px 10px}
.mo-body .rendered th{background:var(--bg-3)}
.mo-body .rendered ul,.mo-body .rendered ol{margin:.6em 0 .6em 1.5em}
.mo-body .rendered li{margin:.3em 0}
.mo-body .rendered strong{color:#fff}
.mo-body .rendered hr{border:none;border-top:1px solid var(--border);margin:1em 0}
.mo-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(30,30,50,.8);border:1px solid var(--border);color:var(--text);font-size:28px;width:48px;height:80px;cursor:pointer;border-radius:var(--radius);z-index:101;display:flex;align-items:center;justify-content:center;transition:.15s}
.mo-arrow:hover{background:var(--accent);color:#000}
.mo-arrow-l{left:8px}.mo-arrow-r{right:8px}
/* CANVAS ELEMENTS (영역/텍스트/이미지 장식) */
.ce{position:absolute;cursor:move}
.ce.region{border:1px dashed rgba(255,255,255,.2);border-radius:8px;z-index:1}
.ce.region .ce-label{position:absolute;left:8px;top:6px;color:#fff;font-weight:600;outline:none;background:transparent;border:none;padding:2px 6px;border-radius:4px;cursor:text}
.ce.region .ce-label:focus{background:rgba(0,0,0,.4)}
.ce.text{z-index:2;color:#fff;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.6);padding:4px 8px;outline:none;background:transparent;border:1px dashed transparent;border-radius:4px}
.ce.text:hover,.ce.text:focus{border-color:rgba(255,255,255,.3);background:rgba(0,0,0,.2)}
.ce.image{z-index:1}
.ce.image img{width:100%;height:100%;display:block;pointer-events:none;border-radius:4px}
.ce.has-node-mode{outline:2px solid var(--accent);outline-offset:1px}
.ce .ce-port{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:var(--bg-1);cursor:crosshair;z-index:20;display:none}
.ce.has-node-mode .ce-port{display:block}
.ce .ce-port-l{left:-9px;top:50%;margin-top:-7px}
.ce .ce-port-r{right:-9px;top:50%;margin-top:-7px}
.ce .ce-port:hover{background:var(--accent);transform:scale(1.4)}
.ce .ce-mode-badge{position:absolute;left:6px;top:6px;background:rgba(0,0,0,.6);color:var(--accent);font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;display:none}
.ce.has-node-mode .ce-mode-badge{display:block}
.ce.sel{outline:2px solid var(--accent);outline-offset:2px}
.ce-resize{position:absolute;right:-4px;bottom:-4px;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:nwse-resize;opacity:0}
.ce.sel .ce-resize{opacity:.8}
.ce-del{position:absolute;right:-10px;top:-10px;width:18px;height:18px;background:var(--red);color:#fff;border-radius:50%;text-align:center;line-height:16px;font-size:13px;cursor:pointer;opacity:0}
.ce.sel .ce-del{opacity:.9}
/* SELECTION BOX */
/* MEMO BAR (상단 탭) */
.memo-bar{display:flex;align-items:center;background:#0a0a14;border-bottom:1px solid var(--border);padding:4px 8px;flex-shrink:0;gap:4px;overflow-x:auto;min-height:32px}
.memo-tab{display:flex;align-items:center;gap:6px;padding:4px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px 6px 0 0;cursor:pointer;font-size:.78em;color:var(--text-dim);transition:.1s;flex-shrink:0;max-width:160px}
.memo-tab:hover{background:var(--bg-3);color:var(--text)}
.memo-tab.active{background:var(--bg-3);border-color:var(--accent);color:var(--accent)}
.memo-tab .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.memo-tab .x{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 2px;border-radius:3px}
.memo-tab .x:hover{color:var(--red);background:rgba(244,67,54,.2)}
.memo-bar button.add{background:var(--accent);color:#000;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:.78em;font-weight:600;flex-shrink:0}
.memo-bar button.add:hover{background:var(--accent-hover)}
.memo-bar button.fld{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:.78em;flex-shrink:0}
.memo-bar button.fld:hover{background:var(--bg-4)}
/* MEMO PANEL (열리면 캔버스 위에 floating) */
#memo-panel{position:fixed;top:80px;right:20px;width:520px;height:calc(100vh - 120px);background:var(--bg-1);border:1px solid var(--border-light);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:90;display:none;flex-direction:column;resize:both;overflow:auto;min-width:320px;min-height:300px}
#memo-panel.show{display:flex}
.mp-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg-2);cursor:move}
.mp-hd input{flex:1;background:var(--bg-0);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:4px;font-size:.85em}
.mp-hd select{background:var(--bg-0);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:.78em}
.mp-hd button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.78em}
.mp-hd button:hover{background:var(--bg-4)}
.mp-hd button.save{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.mp-hd button.x{padding:4px 8px;color:var(--red)}
.mp-tools{display:flex;align-items:center;gap:4px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg-2);font-size:.78em}
.mp-tools button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:3px 10px;border-radius:3px;cursor:pointer;font-size:.85em}
.mp-tools button.act{background:var(--accent);color:#000;border-color:var(--accent)}
.mp-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.mp-body textarea{flex:1;background:var(--bg-0);color:var(--text);border:none;padding:14px;font-family:var(--mono);font-size:14px;line-height:1.6;resize:none;outline:none}
.mp-body .rendered{flex:1;overflow-y:auto;padding:14px;font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.7;color:var(--text)}
.mp-body .rendered h1,.mp-body .rendered h2,.mp-body .rendered h3{color:var(--accent);margin:.8em 0 .4em;border-bottom:1px solid var(--border);padding-bottom:.2em}
.mp-body .rendered code{background:var(--bg-3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.9em}
.mp-body .rendered pre{background:var(--bg-0);border:1px solid var(--border);padding:10px;border-radius:6px;overflow-x:auto}
.mp-body .rendered pre code{background:none}
.mp-body .rendered ul,.mp-body .rendered ol{margin:.5em 0 .5em 1.5em}
.mp-body .rendered blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--text-dim);margin:.5em 0}
/* FOLDER PANEL */
#folder-panel{position:fixed;top:80px;left:20px;width:280px;max-height:calc(100vh - 120px);background:var(--bg-1);border:1px solid var(--border-light);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:91;display:none;flex-direction:column;overflow:hidden}
#folder-panel.show{display:flex}
.fp-hd{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg-2);font-weight:600;font-size:.85em;color:var(--accent)}
.fp-hd button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:3px 10px;border-radius:3px;cursor:pointer;font-size:.78em;margin-left:6px}
.fp-hd button.x{padding:3px 8px;color:var(--red);margin-left:auto}
.fp-list{flex:1;overflow-y:auto;padding:6px}
.fp-folder{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:.82em;color:var(--text);transition:.1s}
.fp-folder:hover{background:var(--bg-3)}
.fp-folder.active{background:var(--bg-3);color:var(--accent)}
.fp-folder .ic{font-size:14px}
.fp-folder .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-folder .cnt{font-size:.7em;color:var(--text-muted);background:var(--bg-4);padding:1px 6px;border-radius:8px}
.fp-folder .del{background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;opacity:0;padding:0 4px}
.fp-folder:hover .del{opacity:.7}
.fp-memos{flex:0 0 50%;overflow-y:auto;padding:6px;border-top:1px solid var(--border);background:var(--bg-0)}
.fp-memo{padding:6px 10px;font-size:.78em;color:var(--text-dim);cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:4px}
.fp-memo:hover{background:var(--bg-3);color:var(--text)}
.fp-memo .pv{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* LANDING MODAL */
#landing{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:200;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
#landing.show{display:flex}
.landing-box{width:90vw;height:85vh;max-width:1400px;background:var(--bg-1);border:1px solid var(--border-light);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.landing-hd{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg-2)}
.landing-hd h2{flex:1;color:var(--accent);font-size:1.1em}
.landing-hd button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:6px 18px;border-radius:6px;cursor:pointer;font-size:.85em}
.landing-hd button:hover{background:var(--bg-4)}
.landing-hd .new-btn{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;margin-right:6px}
.landing-body{flex:1;display:flex;overflow:hidden}
.landing-col{flex:1;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.landing-col:last-child{border-right:none}
.landing-col-hd{padding:10px 16px;background:var(--bg-2);font-size:.85em;color:var(--text-dim);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-weight:600}
.landing-list{flex:1;overflow-y:auto;padding:8px}
.landing-item{padding:10px 14px;border-radius:6px;cursor:pointer;margin-bottom:4px;background:var(--bg-2);border:1px solid var(--border);transition:.1s;display:flex;align-items:center;gap:8px}
.landing-item:hover{background:var(--bg-3);border-color:var(--accent)}
.landing-item.active{background:var(--bg-4);border-color:var(--accent)}
.landing-item .star{color:var(--text-muted);font-size:14px;cursor:pointer}
.landing-item .star.fav{color:#FFD700}
.landing-item .info{flex:1;overflow:hidden}
.landing-item .nm{font-size:.85em;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.landing-item .meta{font-size:.7em;color:var(--text-muted);margin-top:2px}
.landing-item .del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:0;padding:2px 6px;border-radius:3px}
.landing-item:hover .del{opacity:1}
.landing-item .del:hover{background:rgba(244,67,54,.2)}
/* 미니 미리보기 */
.landing-preview{width:480px;border-left:1px solid var(--border);background:var(--bg-0);display:flex;flex-direction:column;flex-shrink:0}
.landing-preview-hd{padding:10px 16px;background:var(--bg-2);font-size:.85em;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border)}
.landing-preview-body{flex:1;position:relative;overflow:hidden;cursor:grab;background:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:20px 20px}
.landing-preview-body.grabbing{cursor:grabbing}
#preview-canvas{position:absolute;top:0;left:0;transform-origin:0 0;pointer-events:none}
#preview-canvas > *{pointer-events:auto}
.preview-node{position:absolute;background:var(--bg-2);border:1.5px solid var(--border);border-radius:6px;font-size:9px;padding:4px 6px;color:var(--text);overflow:hidden;cursor:pointer;min-width:60px}
.preview-node[data-type="agent"]{border-color:#3B82F6}
.preview-node[data-type="memo"]{border-color:#F59E0B}
.preview-node[data-type="input"]{border-color:#06B6D4}
.preview-node[data-type="trigger"]{border-color:#EF4444}
.preview-node:hover{border-color:var(--accent);box-shadow:0 0 8px rgba(76,175,80,.4);z-index:10}
#preview-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:1;transform-origin:0 0;overflow:visible}
.preview-conn{stroke:#7ecfff;stroke-width:0.6;fill:none;opacity:.7;vector-effect:non-scaling-stroke}
.landing-preview-info{display:none;border-top:1px solid var(--border);background:var(--bg-2);max-height:240px}
.landing-preview-info.show{display:flex}
.landing-preview-info .col{flex:1;padding:10px 14px;font-size:.75em;color:var(--text-dim);font-family:var(--mono);white-space:pre-wrap;overflow-y:auto;border-right:1px solid var(--border)}
.landing-preview-info .col:last-child{border-right:none}
.landing-preview-info .col-hd{font-size:.85em;color:var(--accent);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.landing-preview-tools{display:flex;gap:4px;padding:6px 14px;background:var(--bg-2);border-top:1px solid var(--border);font-size:.7em;color:var(--text-muted);align-items:center}
.landing-preview-tools button{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:.85em}
#sel-box{position:absolute;border:1px solid var(--blue);background:rgba(33,150,243,.08);z-index:50;pointer-events:none;display:none}
.snap-guide{position:absolute;background:var(--red);z-index:40;pointer-events:none;opacity:.5}
.snap-guide-h{height:1px;left:0;right:0}.snap-guide-v{width:1px;top:0;bottom:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg-0)}::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
</style>

<script>

// ═══ CANVAS ═══
function applyTx(){cvs.style.transform=`translate(${cx}px,${cy}px) scale(${zoom})`;document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';drawConns()}
function s2c(sx,sy){const r=cw.getBoundingClientRect();return{x:(sx-r.left-cx)/zoom,y:(sy-r.top-cy)/zoom}}
cw.addEventListener('wheel',e=>{
  // 선택된 연결선이 있으면 → 곡률 조정
  if(selectedConn){
    e.preventDefault();
    const c=conns.find(x=>x.id===selectedConn);
    if(c){c.curve=Math.max(-2,Math.min(2,(c.curve||0.5)+(e.deltaY>0?-0.1:0.1)));drawConns();autoSave();return}
  }
  // 그 외: 캔버스 줌
  e.preventDefault();const d=e.deltaY>0?.9:1.1,r=cw.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,nz=Math.max(.1,Math.min(3,zoom*d));cx=mx-(mx-cx)*(nz/zoom);cy=my-(my-cy)*(nz/zoom);zoom=nz;applyTx();
},{passive:false});

cw.addEventListener('mousedown',e=>{
  if(e.button===2)return;
  const onBg=e.target===cw||e.target===cvs||e.target.tagName==='svg'||e.target.id==='svg';
  if(onBg&&isCeCreate&&e.button===0){
    // 영역 그리기 모드
    e.stopPropagation();const cp=s2c(e.clientX,e.clientY);
    ceCreateSX=cp.x;ceCreateSY=cp.y;
    ceCreateEl=document.createElement('div');
    ceCreateEl.style.cssText=`position:absolute;left:${cp.x}px;top:${cp.y}px;width:0;height:0;background:rgba(76,175,80,0.15);border:2px dashed var(--accent);z-index:99;pointer-events:none`;
    cvs.appendChild(ceCreateEl);
    return;
  }
  if(onBg){
    if(e.ctrlKey&&e.button===0){
      // Ctrl+좌클릭 드래그: 선택 박스
      isSelBox=true;const wr=cw.getBoundingClientRect();selBSX=e.clientX-wr.left;selBSY=e.clientY-wr.top;
      const sb=document.getElementById('sel-box');sb.style.display='block';sb.style.left=selBSX+'px';sb.style.top=selBSY+'px';sb.style.width='0';sb.style.height='0';
      nodes.forEach(n=>{n.el.classList.remove('sel','multi-sel')});selectedNode=null;multiSel=[];closeSb();
    } else if(e.button===0||e.button===1){
      // 좌클릭/중간: 팬 (기본)
      isPan=true;panSX=e.clientX-cx;panSY=e.clientY-cy;cw.classList.add('grabbing');
      if(!e.ctrlKey){nodes.forEach(n=>{n.el.classList.remove('sel','multi-sel')});selectedNode=null;multiSel=[];selectedConn=null;closeSb();drawConns()}
    }
  }
});

window.addEventListener('mousemove',e=>{
  if(isPan){cx=e.clientX-panSX;cy=e.clientY-panSY;applyTx()}
  if(isDrag&&dragNd){const p=s2c(e.clientX,e.clientY);let nx=p.x-dragOX,ny=p.y-dragOY;
    // Alt: 스냅 가이드라인
    if(e.altKey){const snap=calcSnap(dragNd,nx,ny);nx=snap.x;ny=snap.y;showGuides(snap)}else{hideGuides()}
    const dx=nx-dragNd.x,dy=ny-dragNd.y;dragNd.x=nx;dragNd.y=ny;dragNd.el.style.left=nx+'px';dragNd.el.style.top=ny+'px';
    multiSel.forEach(n=>{if(n!==dragNd){n.x+=dx;n.y+=dy;n.el.style.left=n.x+'px';n.el.style.top=n.y+'px'}});
    dragOX=p.x-dragNd.x;dragOY=p.y-dragNd.y;drawConns()}
  if(isConn){
    connMX=e.clientX;connMY=e.clientY;drawTmpConn();
    // 연결 중에도 가장 가까운 타겟 포트 강조
    let nearest=null,minDist=120;
    document.querySelectorAll('.port,.ce-port').forEach(p=>{
      const r=p.getBoundingClientRect();
      const dist=Math.hypot(e.clientX-(r.left+r.width/2),e.clientY-(r.top+r.height/2));
      p.classList.remove('near','near-far');
      if(dist<minDist){minDist=dist;nearest=p}
    });
    if(nearest)nearest.classList.add('near');
  }
  if(isDiv&&divNd){const ta=divNd.el.querySelector('.nd-in textarea');if(ta)ta.style.height=Math.max(20,divSH+(e.clientY-divSY))+'px'}
  if(isResize&&resNd){const w=Math.max(180,resSW+(e.clientX-resSX));const h=Math.max(120,resSH+(e.clientY-resSY));resNd.w=w;resNd.h=h;resNd.el.style.width=w+'px';resNd.el.style.height=h+'px';drawConns()}
  if(isSelBox){const sb=document.getElementById('sel-box');const wr=cw.getBoundingClientRect();const mx=e.clientX-wr.left,my=e.clientY-wr.top;const x=Math.min(selBSX,mx),y=Math.min(selBSY,my);sb.style.left=x+'px';sb.style.top=y+'px';sb.style.width=Math.abs(mx-selBSX)+'px';sb.style.height=Math.abs(my-selBSY)+'px'}
  if(isWpDrag&&wpDrag){const cp=s2c(e.clientX,e.clientY);wpDrag.conn.waypoints[wpDrag.idx].x=cp.x;wpDrag.conn.waypoints[wpDrag.idx].y=cp.y;drawConns()}
  if(ceCreateEl){const cp=s2c(e.clientX,e.clientY);const w=cp.x-ceCreateSX,h=cp.y-ceCreateSY;ceCreateEl.style.left=Math.min(ceCreateSX,cp.x)+'px';ceCreateEl.style.top=Math.min(ceCreateSY,cp.y)+'px';ceCreateEl.style.width=Math.abs(w)+'px';ceCreateEl.style.height=Math.abs(h)+'px'}
  if(isCeDrag&&ceDragNd){const cp=s2c(e.clientX,e.clientY);ceDragNd.x=cp.x-ceDragOX;ceDragNd.y=cp.y-ceDragOY;ceDragNd.el.style.left=ceDragNd.x+'px';ceDragNd.el.style.top=ceDragNd.y+'px'}
  if(isCeResize&&ceResNd){const w=Math.max(20,ceResSW+(e.clientX-ceResSX)/zoom),h=Math.max(20,ceResSH+(e.clientY-ceResSY)/zoom);ceResNd.w=w;ceResNd.h=h;ceResNd.el.style.width=w+'px';ceResNd.el.style.height=h+'px'}
  // 가까운 포트 강조 (드래그 중이 아닐 때만)
  if(!isDrag&&!isResize&&!isCeDrag&&!isCeResize){
    let nearest=null,minDist=120;
    document.querySelectorAll('.port,.ce-port').forEach(p=>{
      const r=p.getBoundingClientRect();
      const cx2=r.left+r.width/2,cy2=r.top+r.height/2;
      const dist=Math.hypot(e.clientX-cx2,e.clientY-cy2);
      p.classList.remove('near','near-far');
      if(dist<60)p.dataset.dist=dist;
      else delete p.dataset.dist;
      if(dist<minDist){minDist=dist;nearest=p}
    });
    if(nearest){
      nearest.classList.add('near');
      // 같은 노드의 반대 포트도 살짝 강조
      const sib=nearest.parentElement.querySelectorAll('.port,.ce-port');
      sib.forEach(s=>{if(s!==nearest)s.classList.add('near-far')});
    }
  }
});

// ═══ SNAP GUIDES (Alt+드래그) ═══
// 가이드 DOM 미리 생성 (재사용으로 성능 확보)
const guideH=document.createElement('div');guideH.className='snap-guide snap-guide-h';guideH.style.display='none';
const guideV=document.createElement('div');guideV.className='snap-guide snap-guide-v';guideV.style.display='none';
cw.appendChild(guideH);cw.appendChild(guideV);

function calcSnap(nd,nx,ny){
  const w=nd.collapsed?100:nd.w, h=nd.collapsed?36:nd.h;
  const myMidY=ny+h/2, myCx=nx+w/2;
  let bestH=null,bestV=null,bestDH=20,bestDV=20; // 20px 이내만

  for(const o of nodes){
    if(o===nd)continue;
    const ow=o.collapsed?100:o.w, oh=o.collapsed?36:o.h;
    const oMidY=o.y+oh/2, oCx=o.x+ow/2;
    // 세로 중앙↔중앙 (가장 가까운 것만)
    const dh=Math.abs(myMidY-oMidY);
    if(dh<bestDH){bestDH=dh;bestH={y:oMidY,snapY:oMidY-h/2}}
    // 가로 중앙↔중앙
    const dv=Math.abs(myCx-oCx);
    if(dv<bestDV){bestDV=dv;bestV={x:oCx,snapX:oCx-w/2}}
  }
  // 스냅은 5px 이내일 때만 적용 (나머지는 가이드만 표시)
  const snapR=5;
  const ry=bestH&&bestDH<snapR?bestH.snapY:ny;
  const rx=bestV&&bestDV<snapR?bestV.snapX:nx;
  return{x:rx,y:ry,hGuide:bestH,vGuide:bestV,dH:bestDH,dV:bestDV};
}

function showGuides(snap){
  if(snap.hGuide&&snap.dH<20){guideH.style.display='block';guideH.style.top=(snap.hGuide.y*zoom+cy)+'px'}
  else{guideH.style.display='none'}
  if(snap.vGuide&&snap.dV<20){guideV.style.display='block';guideV.style.left=(snap.vGuide.x*zoom+cx)+'px'}
  else{guideV.style.display='none'}
}
function hideGuides(){guideH.style.display='none';guideV.style.display='none'}

// ═══ CONNECTIONS ═══
function portPos(nd,side){
  // 노드(.port-l/.port-r) 또는 캔버스 요소(.ce-port-l/.ce-port-r)
  const cls=side==='left'?'.port-l, .ce-port-l':'.port-r, .ce-port-r';
  const el=nd.el.querySelector(cls);
  if(!el)return{x:0,y:0};
  const pr=el.getBoundingClientRect(),wr=cw.getBoundingClientRect();
  return{x:pr.left+pr.width/2-wr.left,y:pr.top+pr.height/2-wr.top};
}
function findNodeOrCe(id){return nodes.find(n=>n.id===id)||canvasEls.find(c=>c.id===id)}
function buildPath(pts,curve){
  if(pts.length<2)return '';
  // 점 2개: 단순 베지어 (수평 제어점, 부호로 방향 반전)
  if(pts.length===2){
    const dx=Math.max(Math.abs(pts[1].x-pts[0].x)*0.5,40)*(curve>=0?1:-1)*Math.max(Math.abs(curve),0.1);
    return `M${pts[0].x} ${pts[0].y} C${pts[0].x+dx} ${pts[0].y},${pts[1].x-dx} ${pts[1].y},${pts[1].x} ${pts[1].y}`;
  }
  // 점 3개 이상: Catmull-Rom 스플라인 (모든 점을 매끄럽게 통과)
  // tension은 curve로 조절 (0=직선, 1=부드러움)
  const tension=Math.max(0,Math.min(1,Math.abs(curve)*0.5));
  let d=`M${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[i+2]||pts[i+1];
    const cp1x=p1.x+(p2.x-p0.x)*tension/3;
    const cp1y=p1.y+(p2.y-p0.y)*tension/3;
    const cp2x=p2.x-(p3.x-p1.x)*tension/3;
    const cp2y=p2.y-(p3.y-p1.y)*tension/3;
    d+=` C${cp1x} ${cp1y},${cp2x} ${cp2y},${p2.x} ${p2.y}`;
  }
  return d;
}
function drawConns(){
  svg.querySelectorAll('path,circle').forEach(p=>p.remove());
  conns.forEach(c=>{
    const sn=findNodeOrCe(c.sid),tn=findNodeOrCe(c.tid);
    if(!sn||!tn)return;
    const s=portPos(sn,'right'),e=portPos(tn,'left');
    // waypoints는 캔버스 좌표 → cw 화면 좌표로 변환
    const wpts=(c.waypoints||[]).map(wp=>({x:wp.x*zoom+cx,y:wp.y*zoom+cy}));
    const allPts=[s,...wpts,e];
    const d=buildPath(allPts,c.curve||0.5);

    // 1) 투명한 두꺼운 hit-area path (클릭 영역 확대)
    const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('d',d);
    hit.setAttribute('stroke','transparent');
    hit.setAttribute('stroke-width','24');
    hit.setAttribute('fill','none');
    hit.style.cursor='pointer';
    hit.style.pointerEvents='stroke';
    hit.dataset.connId=c.id;
    const onMouseDown=ev=>{
      ev.stopPropagation();selectedConn=c.id;
      // path 요소 재생성 없이 클래스만 갱신 (dblclick 감지를 위해)
      svg.querySelectorAll('.conn').forEach(el=>el.classList.remove('sel'));
      p.classList.add('sel');
    };
    const onDblClick=ev=>{
      ev.stopPropagation();ev.preventDefault();
      // 캔버스 좌표계로 저장 (팬/줌과 무관하게 노드와 함께 이동)
      const cp=s2c(ev.clientX,ev.clientY);
      c.waypoints=c.waypoints||[];
      c.waypoints.push({x:cp.x,y:cp.y});
      selectedConn=c.id;
      console.log('[CONN] waypoint added',c.id,'canvas:',cp.x,cp.y);
      drawConns();autoSave();
    };
    hit.addEventListener('mousedown',onMouseDown);
    hit.addEventListener('dblclick',onDblClick);
    svg.appendChild(hit);

    // 2) 실제 표시 path
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    const act=sn.status==='running'||tn.status==='running';
    p.setAttribute('d',d);
    p.setAttribute('class','conn'+(act?' active':'')+(selectedConn===c.id?' sel':''));
    p.setAttribute('marker-end','url(#ah)');
    p.style.pointerEvents='none';
    svg.appendChild(p);
    // Waypoint 점은 선택 시에만 표시 (캔버스 좌표 → 화면 좌표)
    if(selectedConn===c.id)(c.waypoints||[]).forEach((wp,i)=>{
      const sx=wp.x*zoom+cx, sy=wp.y*zoom+cy;
      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',sx);circle.setAttribute('cy',sy);circle.setAttribute('r',8);
      circle.setAttribute('fill','#7ecfff');circle.setAttribute('stroke','#fff');circle.setAttribute('stroke-width','2');
      circle.style.cursor='move';circle.style.pointerEvents='all';
      circle.style.opacity=selectedConn===c.id?'1':'.7';
      circle.addEventListener('mousedown',ev=>{ev.stopPropagation();ev.preventDefault();isWpDrag=true;wpDrag={conn:c,idx:i};selectedConn=c.id});
      circle.addEventListener('dblclick',ev=>{ev.stopPropagation();ev.preventDefault();c.waypoints.splice(i,1);drawConns();autoSave()});
      svg.appendChild(circle);
    });
  });
}
function drawTmpConn(){let t=svg.querySelector('.conn-temp');if(!t){t=document.createElementNS('http://www.w3.org/2000/svg','path');t.setAttribute('class','conn-temp');t.setAttribute('marker-end','url(#ah)');svg.appendChild(t)}if(!connSrc)return;const s=portPos(connSrc.node,connSrc.side);const wr=cw.getBoundingClientRect();const ex=connMX-wr.left,ey=connMY-wr.top;const dx=Math.max(Math.abs(ex-s.x)*.4,30);t.setAttribute('d',connSrc.side==='right'?`M${s.x} ${s.y} C${s.x+dx} ${s.y},${ex-dx} ${ey},${ex} ${ey}`:`M${s.x} ${s.y} C${s.x-dx} ${s.y},${ex+dx} ${ey},${ex} ${ey}`)}
function addConn(sid,did){
  if(conns.find(c=>c.sid===sid&&c.tid===did))return;
  conns.push({id:'c'+Date.now()+'_'+Math.random().toString(36).substr(2,4),sid,tid:did,waypoints:[],curve:0.5});
  const srcNd=nodes.find(n=>n.id===sid),dstNd=nodes.find(n=>n.id===did);
  if(srcNd&&dstNd){const tag=`{{${srcNd.name}}}`;if(!dstNd.inputTemplate.includes(tag)){dstNd.inputTemplate=dstNd.inputTemplate?(dstNd.inputTemplate+'\n\n'+tag):tag;const ta=dstNd.el.querySelector('.nd-in textarea');if(ta)ta.value=dstNd.inputTemplate;if(selectedNode===dstNd)document.getElementById('sb-input').value=dstNd.inputTemplate}}
}
function finishConn(e){svg.querySelectorAll('.conn-temp').forEach(p=>p.remove());cw.classList.remove('connecting');if(!isConn||!connSrc){isConn=false;connSrc=null;return}
  const tgt=document.elementFromPoint(e.clientX,e.clientY);
  if(tgt&&(tgt.classList.contains('port')||tgt.classList.contains('ce-port'))){
    let tid,tside,tnd;
    if(tgt.classList.contains('ce-port')){
      // 캔버스 요소 포트 → 부모 ce
      const ceEl=tgt.closest('.ce');
      tid=ceEl?ceEl.dataset.ceId:null;
      tside=tgt.dataset.side;
      tnd=canvasEls.find(c=>c.id===tid);
    } else {
      tid=tgt.dataset.node;tside=tgt.dataset.side;
      tnd=nodes.find(n=>n.id===tid);
    }
    if(tnd&&tnd!==connSrc.node&&connSrc.side!==tside){
      // 다중 선택 → 단일 노드 연결
      const sources=multiSel.length>0&&multiSel.includes(connSrc.node)?multiSel:[connSrc.node];
      if(connSrc.side==='right'){sources.forEach(sn=>addConn(sn.id,tnd.id))}
      else{sources.forEach(sn=>addConn(tnd.id,sn.id))}
      autoSave()}}
  isConn=false;connSrc=null;drawConns()}

// ═══ NODE ═══
function mkNode(opts={}){
  ncnt++;const type=opts.type||'agent';const ti=TYPES[type];
  const n={id:opts.id||('n'+Date.now()+'_'+ncnt),name:opts.name||(ti.label+ncnt),type,
    x:opts.x??100,y:opts.y??100,w:opts.w||280,h:opts.h||240,
    paneIndex:opts.paneIndex||null,collapsed:opts.collapsed||false,textSize:opts.textSize||1,chatOnly:opts.chatOnly??true,
    systemPrompt:opts.systemPrompt||'',images:opts.images||[],customImage:opts.customImage||'',
    inputTemplate:opts.inputTemplate||'',inputResolved:'',outputCapture:opts.outputCapture||'',
    status:opts.status||'idle',history:opts.history||[],el:null};
  n.el=buildDom(n);cvs.appendChild(n.el);nodes.push(n);return n;
}
function buildDom(n){
  const ti=TYPES[n.type];const d=document.createElement('div');
  d.className='nd'+(n.collapsed?' collapsed':'')+(n.customImage?' has-bg-img':'');
  d.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px`;
  if(n.customImage)d.style.backgroundImage=`url('${n.customImage}')`;
  d.dataset.nid=n.id;d.dataset.type=n.type;
  const showOut=n.type==='agent';const showBody=n.type!=='trigger';

let arrGapX=60,arrGapY=30,arrVCenter=false; // 저장되는 간격값
function ctxArrLive(){
  const gx=document.getElementById('ctx-gx'),gy=document.getElementById('ctx-gy');
  if(gx){arrGapX=parseInt(gx.value);document.getElementById('ctx-gx-v').textContent=arrGapX}

function arrangeAll(){
  if(nodes.length===0)return;
  const gx=arrGapX,gy=arrGapY,padX=40;
  // BFS 레벨 계산
  const levels=new Map();const roots=nodes.filter(n=>!conns.find(c=>c.tid===n.id));
  if(roots.length===0)roots.push(nodes[0]);
  roots.forEach(n=>levels.set(n.id,0));
  let queue=[...roots];
  while(queue.length){const cur=queue.shift();const lv=levels.get(cur.id);
    conns.filter(c=>c.sid===cur.id).forEach(c=>{const tn=nodes.find(n=>n.id===c.tid);if(tn&&!levels.has(tn.id)){levels.set(tn.id,lv+1);queue.push(tn)}});}
  nodes.forEach(n=>{if(!levels.has(n.id))levels.set(n.id,0)});
  const byLevel=new Map();nodes.forEach(n=>{const lv=levels.get(n.id);if(!byLevel.has(lv))byLevel.set(lv,[]);byLevel.get(lv).push(n)});

  // 1차: 각 레벨의 총 세로 높이 계산
  const levelInfo=[];let curX=padX;let maxTotalH=0;
  const sortedLevels=[...byLevel.keys()].sort((a,b)=>a-b);
  sortedLevels.forEach(lv=>{
    const group=byLevel.get(lv);let maxW=0,totalH=0;
    group.forEach(n=>{const w=n.collapsed?100:n.w;const h=n.collapsed?36:n.h;totalH+=h;if(w>maxW)maxW=w});
    totalH+=(group.length-1)*gy;
    if(totalH>maxTotalH)maxTotalH=totalH;
    levelInfo.push({lv,group,maxW,totalH,x:curX});
    curX+=maxW+gx;
  });

  // 2차: 배치 (세로 중앙 옵션 반영)
  const vcenter=arrVCenter;
  const centerY=maxTotalH/2;
  levelInfo.forEach(li=>{
    const startY=vcenter?(centerY-li.totalH/2):30;
    let curY=startY;
    li.group.forEach(n=>{const h=n.collapsed?36:n.h;
      n.x=li.x;n.y=curY;n.el.style.left=n.x+'px';n.el.style.top=n.y+'px';
      curY+=h+gy});
  });
  drawConns();autoSave();
}

function zoomFit(){

  nodes.forEach(n=>{const w=n.collapsed?140:n.w,h=n.collapsed?80:n.h;
    if(n.x<minX)minX=n.x;if(n.y<minY)minY=n.y;if(n.x+w>maxX)maxX=n.x+w;if(n.y+h>maxY)maxY=n.y+h});
  const pad=60,bw=maxX-minX+pad*2,bh=maxY-minY+pad*2;
  const wr=cw.getBoundingClientRect();
  zoom=Math.min(wr.width/bw,wr.height/bh,1.5);
  cx=wr.width/2-((minX+maxX)/2)*zoom;
  cy=wr.height/2-((minY+maxY)/2)*zoom;
  applyTx();
}

async function cloneNodeMulti(n){
  const cnt=parseInt(prompt(`${n.name} 노드를 몇 개로 분할(클론)할까요?`,'3'));
  if(!cnt||cnt<1)return;
  // upstream/downstream 연결도 복제
  const upstream=conns.filter(c=>c.tid===n.id).map(c=>c.sid);
  const downstream=conns.filter(c=>c.sid===n.id).map(c=>c.tid);
  const newNodes=[];
  for(let i=0;i<cnt;i++){
    const opts={
      type:n.type,
      x:n.x+(i+1)*40,
      y:n.y+(i+1)*40,
      w:n.w,h:n.h,
      inputTemplate:n.inputTemplate,
      systemPrompt:n.systemPrompt,
      chatOnly:n.chatOnly,
      images:[...(n.images||[])],
      collapsed:n.collapsed
    };
    if(n.type==='agent'){
      const r=await api('POST','/api/add-pane',{});
      if(r.ok)opts.paneIndex=r.paneIndex;
    }
    const nn=mkNode(opts);
    nn.name=n.name+'_'+(i+2); // _2, _3, _4...
    nn.el.querySelector('.nd-name').value=nn.name;
    nn.el.querySelector('.coll-badge').textContent=nn.name;
    // 연결 복제
    upstream.forEach(sid=>addConn(sid,nn.id));
    downstream.forEach(tid=>addConn(nn.id,tid));
    newNodes.push(nn);
  }
  drawConns();autoSave();
  console.log(`[CLONE] ${n.name} → ${cnt}개 클론 생성`);
}

// ═══ PDF SPLIT → 노드 자동생성 ═══
async function processPdfSplit(file){
  if(!selectedNode){alert('PDF는 소스가 될 노드를 먼저 선택하세요');return}
  const pages=document.getElementById('sb-pdf-pages').value.trim();
  console.log('[PDF] uploading',file.name,'pages:',pages||'all');
  const reader=new FileReader();
  reader.onload=async()=>{
    const r=await api('POST','/api/pdf-split',{filename:file.name,data:reader.result,pages,dpi:250});
    if(!r.ok){alert('PDF 분할 실패: '+r.error);return}
    console.log(`[PDF] ${r.pages.length}/${r.totalPages} 페이지 변환`);

    const sourceNode=selectedNode;
    // 소스에서 이미 연결된 agent 노드들 (downstream)
    const existingDownstream=conns.filter(c=>c.sid===sourceNode.id).map(c=>nodes.find(n=>n.id===c.tid)).filter(n=>n&&n.type==='agent');

    let reuse=false;
    if(existingDownstream.length>0){
      reuse=confirm(`총 ${r.totalPages}페이지 중 ${r.pages.length}개 변환 완료\n\n현재 소스 노드에 이미 ${existingDownstream.length}개의 Agent 노드가 연결되어 있습니다.\n\n[확인] = 기존 노드 재사용 (이미지/입력 덮어쓰기)\n  - 부족하면 추가 생성\n  - 초과하면 삭제\n\n[취소] = 새 노드 생성 (기존 유지)`);
    } else {
      if(!confirm(`총 ${r.totalPages}페이지 중 ${r.pages.length}개 변환 완료\n\n${r.pages.length}개의 Agent 노드를 생성하고 ${sourceNode.name}에 연결할까요?`))return;
    }

    const tplPrompt=prompt('각 노드에 적용할 공통 input 템플릿:','이 페이지의 내용을 분석해줘');
    if(!tplPrompt)return;

    const startX=sourceNode.x+340;
    const startY=sourceNode.y;
    const targetNodes=[];

    if(reuse){
      // 1) 기존 노드 재사용
      for(let i=0;i<r.pages.length;i++){
        const pg=r.pages[i];
        let nn;
        if(i<existingDownstream.length){
          // 기존 노드 덮어쓰기
          nn=existingDownstream[i];
          nn.name=`Page${pg.page}`;
          nn.el.querySelector('.nd-name').value=nn.name;
          nn.el.querySelector('.coll-badge').textContent=nn.name;
          nn.inputTemplate=tplPrompt;
          const ta=nn.el.querySelector('.nd-in textarea');if(ta)ta.value=tplPrompt;
          nn.images=[pg.path];
          nn.outputCapture='';
          const oc=nn.el.querySelector('.out-c');if(oc)oc.textContent='';
          console.log(`[PDF] reuse node ${i+1}/${r.pages.length}`);
        } else {
          // 부족분 신규 생성
          nn=await addNode('agent',startX,startY+i*260);
          nn.name=`Page${pg.page}`;
          nn.el.querySelector('.nd-name').value=nn.name;
          nn.el.querySelector('.coll-badge').textContent=nn.name;
          nn.inputTemplate=tplPrompt;
          const ta=nn.el.querySelector('.nd-in textarea');if(ta)ta.value=tplPrompt;
          nn.images=[pg.path];
          addConn(sourceNode.id,nn.id);
          console.log(`[PDF] new node ${i+1}/${r.pages.length}`);
        }
        targetNodes.push(nn);
      }
      // 초과 노드 삭제
      if(existingDownstream.length>r.pages.length){
        for(let i=r.pages.length;i<existingDownstream.length;i++){
          console.log(`[PDF] del extra node ${existingDownstream[i].name}`);
          delNode(existingDownstream[i].id);
        }
      }
    } else {
      // 2) 모두 신규 생성
      for(let i=0;i<r.pages.length;i++){
        const pg=r.pages[i];
        const nn=await addNode('agent',startX,startY+i*260);
        nn.name=`Page${pg.page}`;
        nn.el.querySelector('.nd-name').value=nn.name;
        nn.el.querySelector('.coll-badge').textContent=nn.name;
        nn.inputTemplate=tplPrompt;
        const ta=nn.el.querySelector('.nd-in textarea');if(ta)ta.value=tplPrompt;
        nn.images=[pg.path];
        addConn(sourceNode.id,nn.id);
        targetNodes.push(nn);
      }
    }

    // 새로 생성/재사용된 노드 모두 접기
    targetNodes.forEach(nn=>{nn.collapsed=true;nn.el.classList.add('collapsed');const btn=nn.el.querySelector('[data-act="tog"]');if(btn)btn.textContent='►'});

    drawConns();autoSave();arrangeAll();
  };
  reader.readAsDataURL(file);
}

// ═══ IMAGE UPLOAD ═══
async function uploadImageFile(file){
  if(!selectedNode)return;
  const reader=new FileReader();
  reader.onload=async()=>{
    const r=await api('POST','/api/upload',{filename:file.name,data:reader.result,purpose:'image'});
    if(r.ok){
      if(!selectedNode.images)selectedNode.images=[];
      selectedNode.images.push(r.path);
      openSb(selectedNode);autoSave();
      console.log('[UPLOAD]',file.name,'→',r.path);
    }else alert('업로드 실패: '+r.error);
  };
  reader.readAsDataURL(file);
}
function removeImage(idx){
  if(!selectedNode||!selectedNode.images)return;
  selectedNode.images.splice(idx,1);
  openSb(selectedNode);autoSave();
}
// 파일 선택 + 드래그앤드롭 핸들러 (한 번만 등록)
function setupImageDrop(){
  const drop=document.getElementById('sb-img-drop');
  const input=document.getElementById('sb-img-input');
  if(!drop||drop.dataset.bound)return;
  drop.dataset.bound='1';
  drop.addEventListener('click',()=>input.click());
  input.addEventListener('change',e=>{[...e.target.files].forEach(uploadImageFile);input.value=''});
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.borderColor='var(--accent)';drop.style.background='rgba(76,175,80,.1)'});
  drop.addEventListener('dragleave',e=>{drop.style.borderColor='';drop.style.background=''});
  drop.addEventListener('drop',e=>{e.preventDefault();drop.style.borderColor='';drop.style.background='';[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach(uploadImageFile)});
}

// ═══ SPLIT NODE ═══
async function splitNode(){
  if(!selectedNode||selectedNode.type!=='agent')return;
  const count=parseInt(document.getElementById('sb-split-n').value)||3;
  const src=selectedNode;
  // 연결된 upstream 찾기
  const upConns=conns.filter(c=>c.tid===src.id);
  for(let i=0;i<count;i++){
    const nn=await addNode('agent',src.x+(i+1)*320,src.y+i*40);
    nn.inputTemplate=src.inputTemplate;nn.chatOnly=src.chatOnly;
    const ta=nn.el.querySelector('.nd-in textarea');if(ta)ta.value=nn.inputTemplate;
    // upstream과 동일하게 연결
    upConns.forEach(uc=>addConn(uc.sid,nn.id));
  }
  drawConns();autoSave();
}

function modalToggleRender(){
  modalIsRendered=!modalIsRendered;
  const body=document.getElementById('mo-body');
  const btn=document.getElementById('mo-render-btn');
  if(modalIsRendered){
    const text=modalType==='input'?(selectedNode?getResolvedText(selectedNode):''):(selectedNode?selectedNode.outputCapture:'');
    body.innerHTML=`<div class="rendered" style="font-size:${modalFontSize}px">${renderMd(text)}</div>`;

function getResolvedText(nd){
  let t=nd.inputTemplate;
  nodes.forEach(n=>{const ph=`{{${n.name}}}`;if(t.includes(ph))t=t.replaceAll(ph,n.outputCapture||'')});
  return t;
}

// ═══ CANVAS ELEMENTS (영역/텍스트/이미지) ═══
function mkCe(opts={}){
  const ce={
    id:opts.id||'ce'+Date.now()+'_'+Math.random().toString(36).substr(2,4),
    type:opts.type||'text',
    x:opts.x??100,y:opts.y??100,
    w:opts.w||200,h:opts.h||100,
    color:opts.color||'rgba(76,175,80,0.15)',
    label:opts.label||'',
    content:opts.content||'',
    fontSize:opts.fontSize||16,
    src:opts.src||'',
    nodeType:opts.nodeType||null,  // null|agent|memo|input|trigger
    nodeName:opts.nodeName||opts.label||'Image',
    inputTemplate:opts.inputTemplate||'',
    outputCapture:opts.outputCapture||'',
    chatOnly:opts.chatOnly??true,
    paneIndex:opts.paneIndex||null,
    status:opts.status||'idle',
    el:null
  };
  ce.el=buildCeDom(ce);cvs.appendChild(ce.el);canvasEls.push(ce);return ce;
}
function buildCeDom(ce){
  const d=document.createElement('div');
  d.className='ce '+ce.type;d.dataset.ceId=ce.id;
  d.style.cssText=`left:${ce.x}px;top:${ce.y}px;width:${ce.w}px;height:${ce.h}px`;
  if(ce.type==='region'){
    d.style.background=ce.color;
    d.innerHTML=`<input class="ce-label" value="${ce.label||''}" placeholder="영역 이름" style="font-size:${ce.fontSize}px"><div class="ce-resize"></div><div class="ce-del">×</div>`;
  } else if(ce.type==='text'){
    d.style.cssText+=`;font-size:${ce.fontSize}px;width:auto;height:auto;min-width:60px`;
    d.contentEditable='true';d.textContent=ce.content||'텍스트';
    d.innerHTML+='<div class="ce-del">×</div>';
  } else if(ce.type==='image'){
    d.innerHTML=`<img src="${ce.src}" draggable="false">
      <div class="ce-mode-badge">${ce.nodeType?ce.nodeType.toUpperCase():''}</div>
      <div class="ce-port ce-port-l" data-side="left"></div>
      <div class="ce-port ce-port-r" data-side="right"></div>
      <div class="ce-resize"></div><div class="ce-del">×</div>`;
    if(ce.nodeType)d.classList.add('has-node-mode');
    // 포트 이벤트
    d.querySelectorAll('.ce-port').forEach(port=>port.addEventListener('mousedown',ev=>{
      ev.stopPropagation();ev.preventDefault();
      isConn=true;connSrc={node:ce,side:port.dataset.side,isCe:true};cw.classList.add('connecting');
    }));
  }
  // 이벤트
  d.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('ce-resize')){e.stopPropagation();isCeResize=true;ceResNd=ce;ceResSX=e.clientX;ceResSY=e.clientY;ceResSW=ce.w;ceResSH=ce.h;return}
    if(e.target.classList.contains('ce-del')){e.stopPropagation();delCe(ce.id);return}
    if(e.target.tagName==='INPUT'||e.target.contentEditable==='true'){return}
    e.stopPropagation();isCeDrag=true;ceDragNd=ce;
    const p=s2c(e.clientX,e.clientY);ceDragOX=p.x-ce.x;ceDragOY=p.y-ce.y;
    selCe(ce);
  });
  d.addEventListener('contextmenu',e=>{
    if(ce.type==='region'){e.preventDefault();e.stopPropagation();showColorPicker(e,ce)}
  });
  // 이름/텍스트 변경
  if(ce.type==='region'){
    const inp=d.querySelector('.ce-label');
    inp.addEventListener('input',()=>{ce.label=inp.value;autoSave()});
    inp.addEventListener('mousedown',e=>e.stopPropagation());
    inp.addEventListener('wheel',e=>{if(e.ctrlKey){e.preventDefault();ce.fontSize=Math.max(8,Math.min(48,ce.fontSize+(e.deltaY>0?-2:2)));inp.style.fontSize=ce.fontSize+'px';autoSave()}});
  }
  if(ce.type==='text'){
    d.addEventListener('input',()=>{ce.content=d.textContent;autoSave()});
    d.addEventListener('wheel',e=>{if(e.ctrlKey){e.preventDefault();ce.fontSize=Math.max(8,Math.min(72,ce.fontSize+(e.deltaY>0?-2:2)));d.style.fontSize=ce.fontSize+'px';autoSave()}});
  }
  return d;
}

  ce.el.classList.add('sel');selectedCe=ce;
  // 이미지면 사이드바에 노드 모드 설정 표시
  if(ce.type==='image')openCeSidebar(ce);

// ═══ ENGINE ═══
const engine={
  running:false,polls:new Map(),
  startAll(){
    // 전체 실행 시 모든 노드 초기화 (새 채팅)
    this.stop();
    nodes.forEach(n=>{
      n.outputCapture='';n.inputResolved='';n.status='idle';
      const oc=n.el.querySelector('.out-c');if(oc)oc.textContent='';
      this.setSt(n,'idle');
    });
    if(selectedNode)document.getElementById('sb-output').textContent='대기 중';
    console.log('[ENGINE] 전체 초기화 → 새 실행 시작');
    this.running=true;
    const roots=nodes.filter(n=>!conns.find(c=>c.tid===n.id));
    if(!roots.length&&nodes.length)nodes.forEach(n=>this.executeNode(n));
    else roots.forEach(n=>this.executeNode(n));
  },
  stop(){this.running=false;this.polls.forEach(id=>clearInterval(id));this.polls.clear();nodes.forEach(n=>this.setSt(n,'idle'))},
  stopNode(n){if(!n)return;const pid=this.polls.get(n.id);if(pid){clearInterval(pid);this.polls.delete(n.id)}this.setSt(n,'idle')},
  execSelected(){if(selectedNode){this.running=true;this.executeNode(selectedNode)}},
  upstream(nid){return conns.filter(c=>c.tid===nid).map(c=>findNodeOrCe(c.sid)).filter(Boolean)},
  downstream(nid){return conns.filter(c=>c.sid===nid).map(c=>findNodeOrCe(c.tid)).filter(Boolean)},
  canExec(nid){return this.upstream(nid).every(n=>n.status==='complete')},
  resolve(nd){
    let t=nd.inputTemplate;
    const all=[...nodes,...canvasEls.filter(c=>c.nodeType)];
    all.forEach(n=>{const ph=`{{${n.name||n.nodeName}}}`;if(t.includes(ph))t=t.replaceAll(ph,n.outputCapture||'')});
    nd.inputResolved=t;return t;
  },
  async executeNode(nd, retryCount=0){
    this.running=true;
    if(nd.type==='trigger'){this.setSt(nd,'complete');this.downstream(nd.id).forEach(dn=>{if(this.canExec(dn.id))this.executeNode(dn)});return}
    if(nd.type==='memo'||nd.type==='input'){nd.outputCapture=nd.inputTemplate;this.setSt(nd,'complete');this.downstream(nd.id).forEach(dn=>{if(this.canExec(dn.id))this.executeNode(dn)});return}

    // 다중 upstream 대기 (모두 complete여야 실행)
    const upstream=this.upstream(nd.id);
    const incomplete=upstream.filter(u=>u.status!=='complete');
    if(incomplete.length>0&&retryCount===0){
      console.log(`[${nd.name}] 상위 노드 미완료: ${incomplete.map(u=>u.name).join(', ')} → 대기`);
      return;
    }

    const input=this.resolve(nd);
    if(!input.trim()){this.setSt(nd,'error');return}

    this.setSt(nd,'running');
    const tryLog=retryCount>0?` (재시도 ${retryCount}/5)`:'';
    console.log(`[${nd.name}] 실행 시작${tryLog}`);

    const cwd=document.getElementById('wf-cwd').value.trim()||undefined;
    const chatOnly=nd.chatOnly!==undefined?nd.chatOnly:true;
    const exec=await api('POST','/api/node-exec',{nodeId:nd.id,nodeName:nd.name,prompt:input,inputRaw:nd.inputTemplate,cwd,chatOnly,systemPrompt:nd.systemPrompt||'',images:nd.images||[],projectId:workflowId||''});

    if(!exec.ok){
      console.log(`[${nd.name}] API 실패`);
      return this._retryOrFail(nd,retryCount);
    }

    let pc=0;
    const pid=setInterval(async()=>{
      if(!this.running){clearInterval(pid);return}
      pc++;
      if(pc%5===0)console.log(`[${nd.name}] 대기 ${pc*3}초`);
      // 90초 타임아웃
      if(pc>30){clearInterval(pid);this.polls.delete(nd.id);console.log(`[${nd.name}] 타임아웃`);return this._retryOrFail(nd,retryCount)}

      const ck=await api('GET',`/api/node-check?nodeId=${nd.id}`);
      if(ck.ok&&ck.done){
        clearInterval(pid);this.polls.delete(nd.id);
        const output=(ck.output||'').trim();
        // 빈 응답 → 재시도
        if(!output){
          console.log(`[${nd.name}] 빈 응답 → 재시도`);
          return this._retryOrFail(nd,retryCount);
        }
        nd.outputCapture=output;
        console.log(`[${nd.name}] 완료 ${output.length}자`);
        const oc=nd.el.querySelector('.out-c');if(oc)oc.textContent=output;
        if(selectedNode===nd)document.getElementById('sb-output').textContent=output;
        nd.history.push({timestamp:new Date().toISOString(),input:nd.inputResolved,output});
        this.setSt(nd,'complete');autoSave();
        this.downstream(nd.id).forEach(dn=>{if(this.canExec(dn.id))this.executeNode(dn)});
      }
    },3000);
    this.polls.set(nd.id,pid);
  },

  _retryOrFail(nd,retryCount){
    if(retryCount>=5){
      console.log(`[${nd.name}] 5회 재시도 모두 실패 → error`);
      this.setSt(nd,'error');
      const oc=nd.el.querySelector('.out-c');if(oc)oc.textContent='(5회 재시도 실패 — 응답 없음)';
      if(selectedNode===nd)document.getElementById('sb-output').textContent='(5회 재시도 실패)';
      autoSave();
      return;
    }
    console.log(`[${nd.name}] 1.5초 후 재시도 ${retryCount+1}/5`);
    setTimeout(()=>this.executeNode(nd,retryCount+1),1500);
  },
  setSt(nd,st){nd.status=st;nd.el.classList.remove('running','complete','error');if(st!=='idle')nd.el.classList.add(st);const dot=nd.el.querySelector('.nd-st');if(dot)dot.className='nd-st '+st;drawConns()}
};

let wfName='';
function getState(){return{cx,cy,zoom,cwd:document.getElementById('wf-cwd').value,wfName,workflowId,
  nodes:nodes.map(n=>({id:n.id,name:n.name,type:n.type,x:n.x,y:n.y,w:n.w,h:n.h,paneIndex:n.paneIndex,collapsed:n.collapsed,textSize:n.textSize,chatOnly:n.chatOnly,systemPrompt:n.systemPrompt,images:n.images,customImage:n.customImage,inputTemplate:n.inputTemplate,outputCapture:n.outputCapture,status:n.status==='running'?'idle':n.status,history:n.history})),
  connections:conns.map(c=>({id:c.id,sid:c.sid,tid:c.tid,waypoints:c.waypoints||[],curve:c.curve||0.5})),
  canvasElements:canvasEls.map(c=>({id:c.id,type:c.type,x:c.x,y:c.y,w:c.w,h:c.h,color:c.color,label:c.label,content:c.content,fontSize:c.fontSize,src:c.src}))}}
let _saveTimer=null;
let undoStack=[],redoStack=[],lastSavedState=null;
const MAX_UNDO=50;
function undo(){
  if(undoStack.length===0)return;
  redoStack.push(JSON.stringify(getState()));
  const prev=undoStack.pop();
  loadState(JSON.parse(prev));
  lastSavedState=prev;
  console.log('[UNDO] '+undoStack.length+' 남음');
}
function redo(){
  if(redoStack.length===0)return;
  undoStack.push(JSON.stringify(getState()));
  const next=redoStack.pop();
  loadState(JSON.parse(next));
  lastSavedState=next;
  console.log('[REDO]');
}
let _lastTempSave=0;
function autoSave(){
  if(lastSavedState){
    undoStack.push(lastSavedState);
    if(undoStack.length>MAX_UNDO)undoStack.shift();
    redoStack=[];
  }
  lastSavedState=JSON.stringify(getState());
  try{localStorage.setItem(LS_KEY,lastSavedState)}catch(e){}
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const st=getState();
    api('POST','/api/state/save',st);

function renderPreview(){
  const cvsEl=document.getElementById('preview-canvas');
  const svgEl=document.getElementById('preview-svg');
  cvsEl.innerHTML='';svgEl.innerHTML='';
  if(!previewState||!previewState.nodes)return;
  // 노드 렌더
  const nodeMap={};
  previewState.nodes.forEach(n=>{
    const d=document.createElement('div');
    d.className='preview-node';d.dataset.type=n.type||'agent';
    d.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.collapsed?100:(n.w||280)}px;height:${n.collapsed?36:(n.h||240)}px`;
    d.textContent=n.name;d.title=`${n.name}\n\nInput: ${(n.inputTemplate||'').substring(0,200)}\n\nOutput: ${(n.outputCapture||'').substring(0,200)}`;
    d.addEventListener('click',e=>{e.stopPropagation();showPreviewNodeInfo(n)});
    cvsEl.appendChild(d);nodeMap[n.id]=n;
  });
  // SVG에 노드들도 그려야 함 (path 포함하는 큰 영역 필요)
  // SVG 크기 = 모든 노드 포함하는 bbox + 여백
  let minX=0,minY=0,maxX=2000,maxY=2000;
  previewState.nodes.forEach(n=>{const w=n.collapsed?100:(n.w||280),h=n.collapsed?36:(n.h||240);
    if(n.x<minX)minX=n.x;if(n.y<minY)minY=n.y;if(n.x+w>maxX)maxX=n.x+w;if(n.y+h>maxY)maxY=n.y+h});
  svgEl.setAttribute('width',Math.max(maxX+200,2000));
  svgEl.setAttribute('height',Math.max(maxY+200,2000));
  // 연결선
  (previewState.connections||[]).forEach(c=>{
    const sn=nodeMap[c.sid],tn=nodeMap[c.tid];if(!sn||!tn)return;
    const sw=sn.collapsed?100:(sn.w||280),sh=sn.collapsed?36:(sn.h||240);
    const tw=tn.collapsed?100:(tn.w||280),th=tn.collapsed?36:(tn.h||240);
    const x1=sn.x+sw,y1=sn.y+sh/2,x2=tn.x,y2=tn.y+th/2;
    const dx=Math.abs(x2-x1)*0.4+30;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1} ${y1} C${x1+dx} ${y1},${x2-dx} ${y2},${x2} ${y2}`);
    path.setAttribute('class','preview-conn');
    svgEl.appendChild(path);
  });
  setTimeout(previewFit,50);
}
function previewZoom(d){previewZoomVal=Math.max(0.05,Math.min(2,previewZoomVal+d));applyPreviewTx()}
function applyPreviewTx(){
  const cvsEl=document.getElementById('preview-canvas');
  const svgEl=document.getElementById('preview-svg');
  const tx=`translate(${previewCx}px,${previewCy}px) scale(${previewZoomVal})`;
  cvsEl.style.transform=tx;svgEl.style.transform=tx;svgEl.style.transformOrigin='0 0';
  document.getElementById('preview-zoom-lbl').textContent=Math.round(previewZoomVal*100)+'%';
}
function previewFit(){
  if(!previewState||!previewState.nodes||previewState.nodes.length===0)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  previewState.nodes.forEach(n=>{const w=n.collapsed?100:(n.w||280),h=n.collapsed?36:(n.h||240);
    if(n.x<minX)minX=n.x;if(n.y<minY)minY=n.y;if(n.x+w>maxX)maxX=n.x+w;if(n.y+h>maxY)maxY=n.y+h});
  const pad=30,bw=maxX-minX+pad*2,bh=maxY-minY+pad*2;
  const wr=document.querySelector('.landing-preview-body').getBoundingClientRect();
  previewZoomVal=Math.min(wr.width/bw,wr.height/bh,1);
  previewCx=wr.width/2-((minX+maxX)/2)*previewZoomVal;
  previewCy=wr.height/2-((minY+maxY)/2)*previewZoomVal;
  applyPreviewTx();
}
function showPreviewNodeInfo(n){
  const info=document.getElementById('landing-preview-info');
  info.classList.add('show');
  document.getElementById('preview-info-input').textContent=`[${n.name}]\n\n${n.inputTemplate||'(없음)'}`;
  document.getElementById('preview-info-output').textContent=n.outputCapture||'(없음)';
}

// 프리뷰 영역 마우스 휠 줌 + 드래그 팬
(function initPreviewInteraction(){
  const body=document.querySelector('.landing-preview-body');
  if(!body)return;
  let isPanning=false,psx=0,psy=0;
  body.addEventListener('wheel',e=>{
    if(!previewState)return;
    e.preventDefault();
    const r=body.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    const d=e.deltaY>0?.9:1.1;
    const nz=Math.max(.05,Math.min(3,previewZoomVal*d));
    previewCx=mx-(mx-previewCx)*(nz/previewZoomVal);
    previewCy=my-(my-previewCy)*(nz/previewZoomVal);
    previewZoomVal=nz;applyPreviewTx();
  },{passive:false});
  body.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('preview-node'))return;
    isPanning=true;psx=e.clientX-previewCx;psy=e.clientY-previewCy;body.classList.add('grabbing');
  });
  window.addEventListener('mousemove',e=>{
    if(isPanning){previewCx=e.clientX-psx;previewCy=e.clientY-psy;applyPreviewTx()}
  });
  window.addEventListener('mouseup',()=>{if(isPanning){isPanning=false;body.classList.remove('grabbing')}});
})();
