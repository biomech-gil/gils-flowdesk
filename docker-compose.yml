version: '3.8'

# Gil's FlowDesk — Synology NAS 배포 (간소화)
# 모든 경로/비밀번호는 .env 파일에서 설정

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvas_db
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-FlowDesk2026Strong!}
      TZ: Asia/Seoul
    volumes:
      - ${DB_DATA_HOST:-/volume1/FlowDesk/db}:/var/lib/postgresql/data

  flowdesk:
    build: .
    container_name: flowdesk-app
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${PORT:-9090}:8888"
    environment:
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: canvas_db
      DB_USER: canvas
      DB_PASSWORD: ${DB_PASSWORD:-FlowDesk2026Strong!}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_CACHE_DIR: /app/whisper-cache
      TZ: Asia/Seoul
    volumes:
      - ${WORKSPACE_HOST:-/volume1/FlowDesk/workspace}:/workspace
      - ${CLAUDE_CREDS_HOST:-/volume1/FlowDesk/creds}:/claude-creds
      - ${GEMINI_CREDS_HOST:-/volume1/FlowDesk/gemini-creds}:/gemini-creds
      - ${CODEX_CREDS_HOST:-/volume1/FlowDesk/codex-creds}:/codex-creds
      - ${UPLOADS_HOST:-/volume1/FlowDesk/uploads}:/app/uploads
      - ${WHISPER_CACHE_HOST:-/volume1/FlowDesk/whisper-cache}:/app/whisper-cache
      # 멀티계정 CLI 런타임 — Claude/Gemini/Codex CLI가 토큰 갱신 시 쓰는 영구 디렉터리
      # 마운트 안 하면 컨테이너 재시작 시 갱신된 토큰이 휘발돼 인증 실패가 반복됨
      - ${ACCTS_RUNTIME_HOST:-/volume1/FlowDesk/accts-runtime}:/app/accts-runtime
      - ${GMINI_RUNTIME_HOST:-/volume1/FlowDesk/gmini-accts-runtime}:/app/gmini-accts-runtime
      - ${CODEX_RUNTIME_HOST:-/volume1/FlowDesk/codex-accts-runtime}:/app/codex-accts-runtime
      # 시놀로지 전체 디스크를 컨테이너에서 접근 (사용자가 임의 폴더 작업 폴더로 지정 가능)
      # 컨테이너 안에서 /synology/... 로 시놀로지 어떤 폴더든 접근 가능
      # 권한 주의: 컨테이너의 flowdesk(uid 1000)가 쓸 수 있는 폴더만 작성 가능
      - ${SYNOLOGY_ROOT:-/volume1/00_Gils_Project}:/synology
