version: '3.8'

# Gil's FlowDesk — Synology NAS 배포 (간소화)
# 모든 경로/비밀번호는 .env 파일에서 설정

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvas_db
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - ${DB_DATA_HOST}:/var/lib/postgresql/data

  flowdesk:
    build: .
    container_name: flowdesk-app
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${PORT}:8888"
    environment:
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: canvas_db
      DB_USER: canvas
      DB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - ${WORKSPACE_HOST}:/workspace
      - ${CLAUDE_CREDS_HOST}:/claude-creds
      - ${UPLOADS_HOST}:/app/uploads
      # 시놀로지 전체 디스크를 컨테이너에서 접근 (사용자가 임의 폴더 작업 폴더로 지정 가능)
      # 컨테이너 안에서 /synology/... 로 시놀로지 어떤 폴더든 접근 가능
      # 권한 주의: 컨테이너의 flowdesk(uid 1000)가 쓸 수 있는 폴더만 작성 가능
      - ${SYNOLOGY_ROOT:-/volume1}:/synology
