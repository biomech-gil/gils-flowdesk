# ============================================
# tmux 설정 파일 - 한국어 사용자용
# ============================================

# --- 기본 설정 ---
# UTF-8 지원 (한글 입출력 필수)
set -g default-terminal "screen-256color"

# 프리픽스 키: Ctrl+a (기본 Ctrl+b 대신, 더 누르기 편함)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 마우스 지원 활성화 (클릭으로 창 전환, 스크롤 가능)
set -g mouse on

# 히스토리 버퍼 크기
set -g history-limit 10000

# 인덱스 1부터 시작 (0번 키가 멀어서)
set -g base-index 1
setw -g pane-base-index 1

# 창 번호 자동 재정렬
set -g renumber-windows on

# ESC 키 지연 제거 (vim 사용자용)
set -sg escape-time 0

# --- 상태 바 (한글) ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# 상태 바 색상 (Nord 테마)
set -g status-style "bg=#2e3440,fg=#d8dee9"

# 왼쪽: 세션 이름
set -g status-left-length 30
set -g status-left "#[fg=#88c0d0,bold] [세션: #S] #[default]| "

# 오른쪽: 날짜/시간
set -g status-right-length 50
set -g status-right "#[fg=#a3be8c]| %Y년 %m월 %d일 (%a) %H:%M "

# 현재 창 표시
setw -g window-status-current-format "#[fg=#2e3440,bg=#88c0d0,bold] #I:#W "
setw -g window-status-format "#[fg=#d8dee9] #I:#W "

# --- 창 분할 단축키 (직관적) ---
# | 로 세로 분할, - 로 가로 분할
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 새 창을 현재 경로에서 열기
bind c new-window -c "#{pane_current_path}"

# --- 패널 이동 (Alt + 방향키, 프리픽스 없이) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- 패널 크기 조절 (프리픽스 + Ctrl + 방향키) ---
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# --- 설정 다시 불러오기 ---
bind r source-file ~/.tmux.conf \; display-message "설정을 다시 불러왔습니다!"

# --- 복사 모드 (vi 스타일) ---
setw -g mode-keys vi
