<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowDesk 채팅</title>
<style>
:root{--bg-0:#0d0d14;--bg-1:#13131f;--bg-2:#1a1a2e;--bg-3:#222236;--bg-4:#2a2a3e;--border:#333355;--text:#e0e0e0;--text-dim:#888899;--text-muted:#666677;--accent:#4CAF50;--blue:#2196F3;--red:#F44336;--user-bg:#1e3a5f;--radius:8px;--mono:'Consolas','D2Coding',monospace;--nb-border:#000;--nb-border-w:2px;--nb-shadow:3px 3px 0 #000;--nb-radius:4px}
/* 네오브루탈리즘 적용 */
.tb button,.chat-input-bar button,.chat-header .tools button,.chat-header .x{border:var(--nb-border-w) solid var(--nb-border)!important;border-radius:var(--nb-radius)!important;box-shadow:var(--nb-shadow)!important;font-weight:700!important;transition:transform .08s,box-shadow .08s!important}
.tb button:hover,.chat-input-bar button:hover,.chat-header .tools button:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #000!important}
.tb button:active,.chat-input-bar button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000!important}
.chat-panel{border:2px solid #000!important;border-radius:0!important}
.chat-header{border-bottom:2px solid #000!important}
.chat-input-bar{border-top:2px solid #000!important}
input[type="text"],textarea{border:var(--nb-border-w) solid var(--nb-border)!important;border-radius:var(--nb-radius)!important;box-shadow:2px 2px 0 #000!important}
input[type="text"]:focus,textarea:focus{box-shadow:3px 3px 0 var(--accent)!important;outline:none!important}
.msg-bubble{border:2px solid #000!important;border-radius:6px!important;box-shadow:3px 3px 0 #000!important;font-weight:500}
.nl-item.active{border-left:4px solid var(--accent)!important;background:rgba(76,175,80,.15)!important;font-weight:700}
.conv-item.active{border-left:4px solid var(--accent)!important;font-weight:600}
.nav a.active{border-bottom:3px solid var(--accent)!important}
.chat-fav-chip{display:inline-flex;align-items:center;gap:4px;padding:0 10px;height:24px;background:#F59E0B;color:#000;border:2px solid #000;border-radius:4px;font-size:.74em;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:2px 2px 0 #000;transition:transform .08s,box-shadow .08s;line-height:1}
.chat-fav-chip:hover{background:#fbbd2c;transform:translate(-1px,-1px);box-shadow:3px 3px 0 #000}
.chat-fav-chip:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #000}
.chat-fav-add{display:inline-flex;align-items:center;padding:0 10px;height:24px;background:rgba(245,158,11,.1);border:2px dashed #F59E0B;border-radius:4px;color:#ebcb8b;cursor:pointer;font-size:.72em;font-weight:700;flex-shrink:0;line-height:1;white-space:nowrap}
.chat-fav-add:hover{background:rgba(245,158,11,.25);color:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg-0);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.nav{display:flex;align-items:center;background:var(--bg-2);border-bottom:2px solid #000;flex-shrink:0;height:44px;box-shadow:0 4px 0 #000}
.nav a{color:var(--text-dim);text-decoration:none;padding:0 18px;font-size:.85em;font-weight:600;border-bottom:3px solid transparent;transition:.15s;display:flex;align-items:center;height:100%;flex-shrink:0;white-space:nowrap}
.nav a:hover{color:var(--text);background:var(--bg-3)}.nav a.active{color:var(--accent);border-bottom-color:var(--accent)}
.tb{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg-1);border-bottom:2px solid #000;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;height:44px;scrollbar-width:thin}
.tb::-webkit-scrollbar{height:4px}
.tb::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
.tb input{background:var(--bg-3);color:var(--text);border:2px solid #000;padding:0 8px;height:28px;border-radius:4px;font-size:.78em;font-weight:600;flex-shrink:0;box-shadow:2px 2px 0 #000;line-height:1}
.tb input:focus{outline:none;box-shadow:3px 3px 0 var(--accent)}
.tb button{background:rgba(255,255,255,.1);color:var(--text);border:2px solid #000;padding:0 10px;height:28px;border-radius:4px;cursor:pointer;font-size:.78em;font-weight:700;flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;box-shadow:2px 2px 0 #000;line-height:1;transition:transform .08s,box-shadow .08s}
.tb button:hover{background:rgba(255,255,255,.18);transform:translate(-1px,-1px);box-shadow:3px 3px 0 #000}
.tb button:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #000}
.tb .lbl{font-size:.72em;color:var(--text-muted);font-weight:700;flex-shrink:0;white-space:nowrap}
.tb .sep{width:2px;height:22px;background:#000;margin:0 4px;flex-shrink:0;border-radius:1px}
.chat-area{flex:1;display:flex;overflow:hidden;min-height:0}
/* 좌측: 노드 + 분기 목록 */
.side{width:220px;border-right:1px solid var(--border);background:var(--bg-1);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.side-hd{padding:8px 10px;font-size:.75em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg-2)}
.nl-item{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(51,51,85,.3);transition:.1s;font-size:.8em}
.nl-item:hover{background:var(--bg-3)}.nl-item.active{background:var(--bg-3);border-left:3px solid var(--accent)}
.nl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nl-badge{font-size:.65em;padding:1px 5px;border-radius:6px;background:var(--bg-4);color:var(--text-muted)}
.conv-item{display:flex;align-items:center;gap:6px;padding:6px 10px 6px 20px;cursor:pointer;border-bottom:1px solid rgba(51,51,85,.2);font-size:.75em;color:var(--text-dim);transition:.1s}
.conv-item:hover{background:var(--bg-3);color:var(--text)}.conv-item.active{background:var(--bg-3);color:var(--accent)}
/* 멀티 채팅 영역 — 가로 스크롤 */
.chat-multi{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;gap:0;background:var(--border);min-width:0}
.chat-panel{flex:0 0 var(--panel-default-w,420px);min-width:280px;display:flex;flex-direction:column;background:var(--bg-0);min-height:0;position:relative;border-right:1px solid var(--border)}
.chat-panel:last-child{border-right:none}
/* 리사이즈 핸들 (우측 경계) */
.chat-panel-resize{position:absolute;right:-3px;top:0;width:6px;height:100%;cursor:col-resize;z-index:10;background:transparent;transition:background .15s}
.chat-panel-resize:hover,.chat-panel-resize.resizing{background:rgba(76,175,80,.25)}
/* 렌더 모드 (마크다운) */
.chat-panel.render-mode .msg-bubble{font-family:'Segoe UI',sans-serif;white-space:normal}
.chat-panel.render-mode .msg-bubble h1,.chat-panel.render-mode .msg-bubble h2,.chat-panel.render-mode .msg-bubble h3{color:var(--accent);margin:.6em 0 .3em;border-bottom:1px solid var(--border);padding-bottom:.2em}
.chat-panel.render-mode .msg-bubble code{background:var(--bg-3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.9em}
.chat-panel.render-mode .msg-bubble pre{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:10px;overflow-x:auto;margin:.6em 0}
.chat-panel.render-mode .msg-bubble pre code{background:none;padding:0}
.chat-panel.render-mode .msg-bubble table{border-collapse:collapse;margin:.6em 0;width:100%;font-size:.9em}
.chat-panel.render-mode .msg-bubble th,.chat-panel.render-mode .msg-bubble td{border:1px solid var(--border);padding:4px 8px}
.chat-panel.render-mode .msg-bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;margin:.5em 0;color:var(--text-dim)}
.chat-panel.empty{flex:1;align-items:center;justify-content:center;color:var(--text-muted);font-size:.82em}
.chat-header{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg-2);font-size:.82em;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-header .ttl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-header .x{cursor:pointer;color:var(--text-muted);padding:2px 6px;border-radius:4px;font-size:14px}
.chat-header .x:hover{background:var(--red);color:#fff}
.chat-messages{flex:1;overflow-y:auto;padding:14px;min-height:0}
.msg{margin-bottom:12px;max-width:85%}
.msg.user{margin-left:auto}.msg.assistant{margin-right:auto}
.msg-label{font-size:.6em;color:var(--text-muted);margin-bottom:2px;text-transform:uppercase}.msg.user .msg-label{text-align:right}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);font-size:.82em;line-height:1.5;white-space:pre-wrap;word-break:break-word;font-family:var(--mono)}
.msg.user .msg-bubble{background:var(--user-bg);border:1px solid rgba(33,150,243,.15);border-radius:var(--radius) var(--radius) 4px var(--radius)}
.msg.assistant .msg-bubble{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 4px}
.msg-time{font-size:.6em;color:var(--text-muted);margin-top:2px}.msg.user .msg-time{text-align:right}
.msg-typing{color:var(--blue);font-style:italic;font-size:.8em;padding:8px 0;animation:tp 1.5s infinite}
@keyframes tp{0%,100%{opacity:1}50%{opacity:.4}}
.msg-sep{text-align:center;color:var(--text-muted);font-size:.7em;padding:6px 0;border-top:1px dashed var(--border);margin:6px 0}
.chat-input-bar{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--bg-1);flex-shrink:0}
.chat-input-bar textarea{flex:1;background:var(--bg-0);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:var(--radius);font-size:.82em;font-family:var(--mono);resize:none;min-height:38px;max-height:120px;outline:none;line-height:1.4}
.chat-input-bar textarea:focus{border-color:var(--accent)}
.chat-input-bar button{background:var(--accent);color:#000;border:none;padding:8px 18px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:.82em;align-self:flex-end}
.chat-input-bar button:hover{background:#66BB6A}.chat-input-bar button:disabled{opacity:.4;cursor:not-allowed}
.empty-msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.82em;padding:20px;text-align:center}
.pending-badge{display:inline-block;font-size:9px;padding:1px 5px;background:var(--blue);color:#fff;border-radius:4px;margin-left:4px;animation:tp 1.5s infinite}
/* 메시지 모드 배지 — 대화전용/툴사용 구분 */
.mode-badge{display:inline-block;font-size:8.5px;padding:0 4px;border-radius:3px;margin-left:4px;font-weight:700;letter-spacing:.3px;vertical-align:middle}
.mode-badge.chat{background:rgba(33,150,243,.18);color:#7ecfff;border:1px solid rgba(33,150,243,.35)}
.mode-badge.tool{background:rgba(245,158,11,.2);color:#ebcb8b;border:1px solid rgba(245,158,11,.4)}
/* 패널 헤더 토글/툴 버튼 */
.chat-header .tools{display:flex;gap:4px;align-items:center}
.chat-header .tools .toggle{display:flex;align-items:center;gap:3px;font-size:.65em;color:var(--text-dim);cursor:pointer;padding:2px 6px;border-radius:3px;background:var(--bg-3);border:1px solid var(--border)}
.chat-header .tools .toggle:hover{background:var(--bg-4)}
.chat-header .tools .toggle.tool-mode{color:#ebcb8b;border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1)}
.chat-header .tools button{background:var(--bg-3);border:1px solid var(--border);color:var(--text-dim);padding:3px 7px;border-radius:3px;cursor:pointer;font-size:.7em}
.chat-header .tools button:hover{background:var(--bg-4);color:var(--text)}
::-webkit-scrollbar{width:6px;height:8px}::-webkit-scrollbar-track{background:var(--bg-0)}::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--bg-4)}
</style>
</head>
<body>
<nav class="nav"><a href="/">캔버스</a><a href="/chat.html" class="active">채팅</a><a href="/index.html">컨트롤러</a></nav>
<div class="tb">
  <span class="lbl">CWD:</span>
  <input type="text" id="chat-cwd" placeholder="작업 디렉토리 (모든 패널 공통)" style="width:240px">
  <div class="sep"></div>
  <button onclick="closeAllPanels()" title="모든 채팅 닫기">🗑 모두닫기</button>
  <div class="sep"></div>
  <span class="lbl" style="color:#ebcb8b">💬 채팅 즐겨찾기</span>
  <div id="chat-fav-bar" style="display:flex;gap:5px;align-items:center;flex:1;min-width:0;overflow-x:auto;height:100%;padding:0 4px"></div>
  <span class="lbl">패널 <span id="panel-count" style="color:var(--accent);font-weight:700">0</span></span>
  <div class="sep"></div>
  <span class="lbl" title="새로 열리는 패널의 기본 가로 너비">기본 너비</span>
  <input type="number" id="panel-default-w" min="280" max="1400" step="20" style="width:70px" oninput="setDefaultPanelWidth(this.value)">
  <span class="lbl" style="color:var(--text-muted);font-size:.7em">px</span>
</div>
<script>
// 기본 너비 입력 초기값
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('panel-default-w');
  if(inp)inp.value=getDefaultPanelWidth();
});
</script>
<div class="chat-area">
  <div class="side" id="side-panel"></div>
  <div class="chat-multi" id="chat-multi"><div class="chat-panel empty"><div class="empty-msg">← 좌측에서 노드 또는 분기를 선택하면 채팅 패널이 열립니다.<br><br>여러 채팅을 동시에 진행할 수 있어요 (가로 스크롤).</div></div></div>
</div>
<div id="chat-ctx" style="position:fixed;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:1000;min-width:160px;padding:4px 0;display:none">
  <div style="padding:7px 14px;font-size:12px;cursor:pointer;transition:.1s" onmouseover="this.style.background='var(--bg-4)'" onmouseout="this.style.background=''" onclick="chatFork()">🔀 대화 분기 생성</div>
</div>
<script>
const API=location.origin;
// 캔버스와 같은 sessionStorage tabId 사용 → 같은 탭의 캔버스 상태 공유
const TAB_ID=(()=>{let t=sessionStorage.getItem('flowdesk_tab_id');if(!t){t='tab_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);sessionStorage.setItem('flowdesk_tab_id',t)}return t})();
const LS_KEY='tmux_canvas_state_'+TAB_ID;
const LS_KEY_LEGACY='tmux_canvas_state';  // 과거 호환
const LS_PANELS='chat_open_panels_'+TAB_ID;  // 패널 목록도 탭별로 분리
async function api(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);try{const r=await fetch(API+p,o);return await r.json()}catch(e){return{ok:false,error:e.message}}}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

const TYPES={agent:{icon:'🤖',color:'#3B82F6'},memo:{icon:'📝',color:'#F59E0B'},input:{icon:'📎',color:'#06B6D4'},trigger:{icon:'⚡',color:'#EF4444'}};

// 패널 상태: panels[convId] = {convId, nodeId, nodeName, polling, pending, lastMsgId}
const panels=new Map();

function loadCanvasState(){
  try{return JSON.parse(localStorage.getItem(LS_KEY))||JSON.parse(localStorage.getItem(LS_KEY_LEGACY)||'null')}
  catch(e){return null}
}
function loadNodes(){const s=loadCanvasState();return(s&&s.nodes)||[]}
function loadProjectInfo(){const s=loadCanvasState();return s?{id:s.workflowId,name:s.wfName}:{id:null,name:''}}

// 열린 패널 정보 저장 (새로고침/이동 후 복원용)
function savePanelList(){
  const arr=[];
  panels.forEach(p=>arr.push({convId:p.convId,nodeId:p.nodeId,nodeName:p.nodeName}));
  try{localStorage.setItem(LS_PANELS,JSON.stringify(arr))}catch(e){}
}
function loadPanelList(){
  try{return JSON.parse(localStorage.getItem(LS_PANELS))||[]}catch(e){return[]}
}

// 패널별 chatOnly 모드 — convId별 localStorage
function panelModeKey(convId){return 'chat_mode_'+convId}
function loadPanelMode(convId){
  if(!convId)return null;
  const v=localStorage.getItem(panelModeKey(convId));
  if(v===null)return null;
  return v==='1';
}
function savePanelMode(convId,chatOnly){
  if(!convId)return;
  localStorage.setItem(panelModeKey(convId),chatOnly?'1':'0');
}

function togglePanelMode(key,chatOnly){
  const state=panels.get(key);if(!state)return;
  state.chatOnly=chatOnly;
  if(state.convId)savePanelMode(state.convId,chatOnly);
  // 라벨/스타일 갱신
  const lbl=document.querySelector(`[data-mode-label="${key}"]`);
  if(lbl)lbl.textContent=chatOnly?'💬 대화전용':'🔧 툴사용';
  const tog=document.querySelector(`[data-toggle="${key}"]`);
  if(tog)tog.classList.toggle('tool-mode',!chatOnly);
  console.log(`[MODE] ${key} → ${chatOnly?'chat-only':'tool-use'}`);
}

// ═══ PANEL WIDTH / FONT SIZE / TOOLBAR HELPERS ═══
function panelWidthKey(key){return 'chat_panel_w_'+key}
function panelFontKey(key){return 'chat_panel_fs_'+key}
function panelRenderKey(key){return 'chat_panel_rd_'+key}
function loadPanelWidth(key){const v=localStorage.getItem(panelWidthKey(key));return v?parseInt(v):0}
function savePanelWidth(key,w){localStorage.setItem(panelWidthKey(key),String(w))}
function loadPanelFontSize(key){const v=localStorage.getItem(panelFontKey(key));return v?parseFloat(v):0}

// 기본 너비 (새 패널에 적용) — 최상단 설정 입력과 연동
const LS_DEFAULT_W='chat_panel_default_w';
function getDefaultPanelWidth(){const v=localStorage.getItem(LS_DEFAULT_W);return v?parseInt(v):420}
function setDefaultPanelWidth(w){
  w=Math.max(280,Math.min(1400,parseInt(w)||420));
  localStorage.setItem(LS_DEFAULT_W,String(w));
  document.documentElement.style.setProperty('--panel-default-w',w+'px');
  const inp=document.getElementById('panel-default-w');
  if(inp&&parseInt(inp.value)!==w)inp.value=w;
}
// 초기 적용
document.documentElement.style.setProperty('--panel-default-w',getDefaultPanelWidth()+'px');

// 리사이즈 핸들
function setupPanelResize(panel,key){
  const handle=panel.querySelector('.chat-panel-resize');
  if(!handle)return;
  let startX=0,startW=0,dragging=false;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    dragging=true;startX=e.clientX;startW=panel.offsetWidth;
    handle.classList.add('resizing');
    document.body.style.cursor='col-resize';
    const move=ev=>{
      if(!dragging)return;
      const w=Math.max(280,Math.min(1600,startW+(ev.clientX-startX)));
      panel.style.flex=`0 0 ${w}px`;
    };
    const up=()=>{
      if(!dragging)return;
      dragging=false;
      handle.classList.remove('resizing');
      document.body.style.cursor='';
      savePanelWidth(key,panel.offsetWidth);
      document.removeEventListener('mousemove',move);
      document.removeEventListener('mouseup',up);
    };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
  // 더블클릭 → 기본 너비로 리셋
  handle.addEventListener('dblclick',()=>{
    panel.style.flex=`0 0 ${getDefaultPanelWidth()}px`;
    localStorage.removeItem(panelWidthKey(key));
  });
}

// 글자 크기
function panelFontSize(key,delta){
  const el=document.querySelector(`[data-msgs="${key}"]`);
  if(!el)return;
  const cur=parseFloat(getComputedStyle(el).fontSize);
  const base=parseFloat(el.style.fontSize)||(cur/16);
  // stored as em string; if px, fallback to em base .82
  let emNow=parseFloat((el.style.fontSize||'0.82em').replace('em',''));
  if(!emNow||isNaN(emNow))emNow=0.82;
  emNow=Math.max(.6,Math.min(1.6,emNow+delta*0.08));
  el.style.fontSize=emNow+'em';
  localStorage.setItem(panelFontKey(key),String(emNow));
}

// 마크다운 렌더 토글 (marked.js 필요 — CDN 로드)
let _markedLoaded=false;
async function ensureMarked(){
  if(_markedLoaded)return;
  if(window.marked){_markedLoaded=true;return}
  await new Promise((ok,ng)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    s.onload=()=>{_markedLoaded=true;ok()};
    s.onerror=ng;
    document.head.appendChild(s);
  });
}
async function panelToggleRender(key){
  await ensureMarked();
  const panel=document.querySelector(`[data-panel-key="${key}"]`);
  if(!panel)return;
  const on=panel.classList.toggle('render-mode');
  localStorage.setItem(panelRenderKey(key),on?'1':'0');
  // 기존 bubble들 렌더 or 원문 복구
  panel.querySelectorAll('.msg-bubble').forEach(b=>{
    if(on){
      const raw=b.dataset.raw||b.textContent;
      b.dataset.raw=raw;
      try{b.innerHTML=window.marked.parse(raw)}catch(e){b.textContent=raw}
    } else {
      if(b.dataset.raw)b.textContent=b.dataset.raw;
    }
  });
}

// 대화 전체 텍스트
function _panelAllText(key){
  const el=document.querySelector(`[data-msgs="${key}"]`);
  if(!el)return '';
  const parts=[];
  el.querySelectorAll('.msg').forEach(m=>{
    const role=m.classList.contains('user')?'[User]':'[Assistant]';
    const b=m.querySelector('.msg-bubble');
    const t=b?(b.dataset.raw||b.textContent):'';
    parts.push(role+': '+t);
  });
  return parts.join('\n\n');
}
function _panelLastAssistantText(key){
  const el=document.querySelector(`[data-msgs="${key}"]`);
  if(!el)return '';
  const msgs=[...el.querySelectorAll('.msg.assistant')];
  if(!msgs.length)return '';
  const b=msgs[msgs.length-1].querySelector('.msg-bubble');
  return b?(b.dataset.raw||b.textContent):'';
}

// 단독 HTML 파싱 (canvas와 동일 규칙)
function _chatExtractStandaloneHtml(text){
  if(!text)return null;
  let m=text.match(/<!DOCTYPE\s+html[\s\S]*?<\/html\s*>/i);
  if(m)return m[0];
  m=text.match(/```(?:html|HTML)\s*\n?([\s\S]*?)```/);
  if(m){
    const inner=m[1].trim();
    if(/<html[\s>]/i.test(inner)||/<!DOCTYPE/i.test(inner))return inner;
  }
  m=text.match(/<html[\s\S]*?<\/html\s*>/i);
  if(m)return m[0];
  return null;
}
function panelOpenStandaloneHtml(key){
  const html=_chatExtractStandaloneHtml(_panelLastAssistantText(key));
  if(!html)return alert('마지막 어시스턴트 응답에 단독 HTML이 없습니다.');
  try{
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){alert('새 탭 열기 실패: '+e.message)}
}
function panelDownloadStandaloneHtml(key){
  const html=_chatExtractStandaloneHtml(_panelLastAssistantText(key));
  if(!html)return alert('단독 HTML을 찾을 수 없습니다.');
  const st=panels.get(key);
  const base=((st&&st.nodeName)||'chat').replace(/[\\/:*?"<>|]/g,'_');
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${base}_${Date.now()}.html`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500);
}

  const savedMode=loadPanelMode(convId);

  panels.set(key,state);

  panel.dataset.panelKey=key;

  if(savedW)panel.style.flex=`0 0 ${savedW}px`;
  const t=TYPES[nodeType]||TYPES.agent;
  panel.innerHTML=`
    <div class="chat-header">
      <span style="font-size:1.1em">${t.icon}</span>
      <span class="ttl">${escH(nodeName)}${isNew?' <span style="color:var(--text-muted);font-size:.85em">(새 대화)</span>':''}</span>
      <div class="tools">
        <label class="toggle ${state.chatOnly?'':'tool-mode'}" data-toggle="${key}" title="대화전용 = 도구 안 씀 (빠름) / 툴사용 = 파일·웹 등 사용 가능 (느림)">
          <input type="checkbox" ${state.chatOnly?'':'checked'} onchange="togglePanelMode('${key}',!this.checked)" style="cursor:pointer">
          <span data-mode-label="${key}">${state.chatOnly?'💬 대화전용':'🔧 툴사용'}</span>
        </label>
        <button onclick="panelFontSize('${key}',-1)" title="글자 축소">A-</button>
        <button onclick="panelFontSize('${key}',1)" title="글자 확대">A+</button>
        <button onclick="panelToggleRender('${key}')" title="마크다운 렌더 on/off" data-btn="render-${key}">🖋 렌더</button>
        <button onclick="panelOpenHtmlTab('${key}')" title="전체 대화를 HTML 페이지로 열기">📄 HTML</button>
        <button onclick="panelOpenStandaloneHtml('${key}')" title="마지막 어시스턴트 응답 내 단독 HTML 블록만 새 탭으로 렌더" style="color:#c4b5fd">🌐 단독HTML</button>
        <button onclick="panelDownloadStandaloneHtml('${key}')" title="마지막 응답 내 단독 HTML 블록을 .html 파일로 다운로드" style="color:#c4b5fd">⬇ HTML</button>
        <button onclick="panelCopyAll('${key}')" title="대화 전체 복사">📋 복사</button>
        <button onclick="addChatToFav('${key}')" title="이 대화를 즐겨찾기에 저장 (다시 열어 이어가기)">⭐ 즐찾</button>
        <button onclick="exportChatToMemo('${key}')" title="이 대화 전체를 메모로 저장">📝 메모</button>
        <span class="x" onclick="closePanel('${key}')" title="닫기" style="cursor:pointer;color:var(--text-muted);padding:2px 6px;border-radius:4px">✕</span>

    <div class="chat-messages" data-msgs="${key}" style="font-size:${loadPanelFontSize(key)||.82}em"></div>

// DB에서 메시지 다시 로드 (응답 도착 확인 포함)
async function reloadMessages(key){
  const state=panels.get(key);if(!state||!state.convId)return;
  const r=await api('GET',`/api/conv/messages?convId=${state.convId}`);
  const el=document.querySelector(`[data-msgs="${key}"]`);
  if(!el)return;
  el.innerHTML='';
  if(r.ok&&r.messages){
    r.messages.forEach((m,i)=>{
      addMsgUI(key,m.role,m.content,m.ts,m.role==='user'?'YOU':'CLAUDE',m.chat_only);
      state.lastMsgId=m.id;
    });
    state.lastRole=r.messages.length?r.messages[r.messages.length-1].role:null;
  }
  // 저장된 렌더 모드 복원
  if(localStorage.getItem(panelRenderKey(key))==='1'){
    panelToggleRender(key);  // toggles on
  }
}

// 마지막 메시지가 user면 응답 대기중이라 판단 → 폴링 재개
async function maybeResumePolling(key){
  const state=panels.get(key);if(!state)return;
  if(state.lastRole==='user'){
    console.log('[RESUME]',key,'폴링 재개');
    showTyping(key);
    startPolling(key);
  }
}

function closePanel(key){
  const state=panels.get(key);if(!state)return;
  if(state.polling){clearInterval(state.polling);state.polling=null}
  panels.delete(key);
  const el=document.querySelector(`[data-panel-key="${key}"]`);if(el)el.remove();
  // 다 닫혔으면 빈 안내
  if(panels.size===0){
    document.getElementById('chat-multi').innerHTML='<div class="chat-panel empty"><div class="empty-msg">← 좌측에서 노드 또는 분기를 선택하면 채팅 패널이 열립니다.<br><br>여러 채팅을 동시에 진행할 수 있어요 (가로 스크롤).</div></div>';
  }
  savePanelList();
  renderSidePanel();
}

function closeAllPanels(){
  if(!confirm(`열린 채팅 패널 ${panels.size}개 모두 닫을까요?\n(서버의 응답 생성은 백그라운드에서 계속됩니다)`))return;

function addMsgUI(key,role,content,ts,label,chatOnlyFlag){
  const el=document.querySelector(`[data-msgs="${key}"]`);if(!el)return;
  const d=document.createElement('div');d.className='msg '+role;
  const time=ts?new Date(ts).toLocaleTimeString('ko-KR'):'';
  // 모드 배지 (대화전용/툴사용)
  let modeBadge='';
  if(chatOnlyFlag!==undefined&&chatOnlyFlag!==null){
    const isChat=(chatOnlyFlag==1||chatOnlyFlag===true);
    modeBadge=`<span class="mode-badge ${isChat?'chat':'tool'}" title="${isChat?'대화전용 모드 (도구 사용 안 함)':'툴사용 모드 (파일/웹/Bash 등 가능)'}">${isChat?'💬':'🔧'}</span>`;
  }
  const rawAttr=content.replace(/"/g,'&quot;');
  d.innerHTML=`<div class="msg-label">${label||role.toUpperCase()}${modeBadge}</div><div class="msg-bubble" data-raw="${rawAttr}">${escH(content)}</div><div class="msg-time">${time}</div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  // 패널이 렌더 모드라면 새 메시지도 즉시 마크다운 렌더
  const panel=el.closest('.chat-panel');
  if(panel&&panel.classList.contains('render-mode')&&window.marked){
    const b=d.querySelector('.msg-bubble');
    try{b.innerHTML=window.marked.parse(content)}catch(e){}
  }
}

function showTyping(key){
  const el=document.querySelector(`[data-msgs="${key}"]`);if(!el)return;
  removeTyping(key);
  const td=document.createElement('div');td.className='msg-typing';td.dataset.typing=key;td.textContent='응답 생성 중... (다른 화면 가도 백그라운드에서 계속됨)';
  el.appendChild(td);el.scrollTop=el.scrollHeight;
}
function removeTyping(key){
  const t=document.querySelector(`[data-typing="${key}"]`);if(t)t.remove();
}

async function sendChat(key){
  const state=panels.get(key);if(!state)return;
  const input=document.querySelector(`[data-input="${key}"]`);
  const btn=document.querySelector(`[data-send="${key}"]`);
  const msg=input.value.trim();if(!msg)return;
  input.value='';btn.disabled=true;state.pending=true;
  // 메시지에 현재 모드 배지 표시 (이번 메시지가 어느 모드로 보내지는지)
  addMsgUI(key,'user',msg,new Date().toISOString(),'YOU',state.chatOnly);
  showTyping(key);

  const cwd=document.getElementById('chat-cwd').value.trim()||undefined;
  // 패널별 chatOnly 사용 (전역이 아님 — 각 패널이 독립 모드)
  state._lastSentChatOnly=state.chatOnly;
  const r=await api('POST','/api/chat',{convId:state.convId||'',nodeId:state.nodeId,nodeName:state.nodeName,message:msg,cwd,chatOnly:state.chatOnly});

  if(r.ok&&r.convId){
    // 새 대화면 진짜 convId로 키 교체
    if(state.isNew||!state.convId){
      const oldKey=state.key;
      const newKey=r.convId;
      state.convId=r.convId;state.key=newKey;state.isNew=false;
      panels.delete(oldKey);panels.set(newKey,state);
      // 패널별 모드 저장
      savePanelMode(newKey,state.chatOnly);
      // DOM 업데이트 (data-* 속성 교체)
      ['data-panel-key','data-msgs','data-input','data-send','data-typing','data-toggle','data-mode-label'].forEach(attr=>{
        document.querySelectorAll(`[${attr}="${oldKey}"]`).forEach(el=>el.setAttribute(attr,newKey));
      });
      // onclick 핸들러 재바인딩
      const panel=document.querySelector(`[data-panel-key="${newKey}"]`);
      if(panel){
        panel.querySelectorAll('[onclick]').forEach(el=>{
          const oc=el.getAttribute('onclick');
          if(oc&&oc.includes(oldKey))el.setAttribute('onclick',oc.replaceAll(oldKey,newKey));
        });
        const ta=panel.querySelector('textarea');
        if(ta)ta.setAttribute('onkeydown',`if(event.key==='Enter'&&!event.shiftKey&&!event.ctrlKey){event.preventDefault();sendChat('${newKey}')}`);
        const cb=panel.querySelector('input[type=checkbox]');
        if(cb)cb.setAttribute('onchange',`togglePanelMode('${newKey}',!this.checked)`);
      }
      savePanelList();
    }
    startPolling(state.key);
  }else{
    removeTyping(key);
    btn.disabled=false;state.pending=false;
    addMsgUI(key,'assistant','(전송 실패: '+(r.error||'unknown')+')','','ERROR');
  }
  renderSidePanel();
}

// 폴링 시작 — 다른 패널과 독립
function startPolling(key){
  const state=panels.get(key);if(!state||!state.convId)return;
  if(state.polling)clearInterval(state.polling);
  let tries=0;
  state.polling=setInterval(async()=>{
    tries++;
    if(tries>200){clearInterval(state.polling);state.polling=null;state.pending=false;
      removeTyping(key);
      const btn=document.querySelector(`[data-send="${key}"]`);if(btn)btn.disabled=false;
      addMsgUI(key,'assistant','(타임아웃 — 서버 응답 없음. 잠시 후 패널 다시 열면 결과 확인 가능)','','SYSTEM');
      return;
    }
    const ck=await api('GET',`/api/chat-check?convId=${state.convId}`);
    if(ck.ok&&ck.done){
      clearInterval(state.polling);state.polling=null;state.pending=false;
      removeTyping(key);
      // 응답 메시지에도 모드 배지 (이번 응답이 어느 모드로 처리됐는지)
      addMsgUI(key,'assistant',ck.reply,new Date().toISOString(),'CLAUDE',state._lastSentChatOnly);
      const btn=document.querySelector(`[data-send="${key}"]`);if(btn)btn.disabled=false;
      renderSidePanel();
    }
  },2000);
}

// ═══ 채팅 즐겨찾기 (대화 분류 + 다시 열기) ═══
async function loadChatFavBar(){
  const r=await api('GET','/api/fav/folders?kind=conversation');
  const el=document.getElementById('chat-fav-bar');
  if(!el)return;
  const folders=(r.ok&&r.folders)||[];
  let html='';
  folders.forEach(f=>{
    html+=`<span class="chat-fav-chip" onclick="openChatFavFolder(${f.id},'${escH(f.name)}')" oncontextmenu="event.preventDefault();renameChatFavFolder(${f.id},'${escH(f.name)}')" title="우클릭=이름변경">${f.icon||'⭐'} ${escH(f.name)}</span>`;
  });
  html+=`<span class="chat-fav-add" onclick="newChatFavFolder()">+ 새 폴더</span>`;
  el.innerHTML=html;
}
async function newChatFavFolder(){
  const name=prompt('새 채팅 즐겨찾기 폴더 이름:');
  if(!name)return;
  await api('POST','/api/fav/folder/save',{name,kind:'conversation'});
  loadChatFavBar();
}
async function renameChatFavFolder(id,oldName){
  const name=prompt('폴더 이름 변경:',oldName);
  if(!name||name===oldName)return;
  await api('POST','/api/fav/folder/save',{id,name});
  loadChatFavBar();
}
async function openChatFavFolder(folderId,folderName){
  // 이 폴더의 대화 목록 모달
  const r=await api('GET',`/api/fav/items?folderId=${folderId}`);
  const items=(r.ok&&r.items)||[];
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;max-height:70vh;background:var(--bg-1);border:2px solid #ebcb8b;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:10001;display:flex;flex-direction:column';
  modal.innerHTML=`
    <div style="padding:12px 16px;background:linear-gradient(to right,rgba(245,158,11,.15),rgba(245,158,11,.05));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <span style="flex:1;font-weight:600;color:#ebcb8b">⭐ ${escH(folderName)}</span>
      <button onclick="deleteChatFavFolder(${folderId},this)" style="background:none;border:1px solid rgba(244,67,54,.3);color:#bf616a;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:11px">🗑 폴더 삭제</button>
      <span style="cursor:pointer;color:var(--text-muted);padding:4px 8px" onclick="this.parentElement.parentElement.remove()">✕</span>
    </div>
    <div style="overflow-y:auto;padding:8px;max-height:60vh">
      ${items.length===0?'<div style="text-align:center;padding:40px;color:var(--text-muted)">비어있음<br><span style="font-size:.85em">채팅 패널 헤더의 [⭐ 즐겨찾기] 버튼으로 추가</span></div>':items.map(it=>`
        <div style="display:flex;gap:8px;align-items:center;padding:8px 10px;margin:2px 0;border-radius:4px;cursor:pointer;border:1px solid var(--border)" onmouseover="this.style.background='var(--bg-3)'" onmouseout="this.style.background=''" onclick="openChat('${it.targetId}','','${escH(it.nodeName||'노드')}');this.parentElement.parentElement.parentElement.remove()">
          <span style="font-size:1.2em">💬</span>
          <div style="flex:1;overflow:hidden">
            <div style="font-weight:600;color:var(--text);font-size:.85em">${escH(it.title||'무제 대화')}</div>
            <div style="color:var(--text-muted);font-size:.7em">${escH(it.preview||'')}</div>
          </div>
          <button onclick="event.stopPropagation();removeChatFav(${it.id},this)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px" title="즐겨찾기에서 제거">✕</button>
        </div>
      `).join('')}
    </div>`;
  document.body.appendChild(modal);
}
async function deleteChatFavFolder(folderId,btn){
  if(!confirm('이 폴더를 삭제할까요?\n(폴더 안의 채팅 링크는 사라지지만 대화 자체는 유지됩니다)'))return;
  await api('POST','/api/fav/folder/delete',{id:folderId});
  if(btn&&btn.closest('div').parentElement.parentElement)btn.closest('div').parentElement.parentElement.remove();
  loadChatFavBar();
}
async function removeChatFav(itemId,btn){
  await api('POST','/api/fav/item/remove',{id:itemId});
  if(btn)btn.closest('div').remove();
}
async function addChatToFav(panelKey){
  const state=panels.get(panelKey);
  if(!state||!state.convId)return alert('아직 저장되지 않은 새 대화입니다 (메시지 1개라도 보낸 후 다시 시도)');
  // 폴더 선택 picker
  const r=await api('GET','/api/fav/folders?kind=conversation');
  const folders=(r.ok&&r.folders)||[];
  let options='';
  folders.forEach(f=>{options+=`<div onclick="pickChatFavFolder(${f.id},'${state.convId}',this)" style="padding:7px 12px;cursor:pointer;border-radius:3px;font-size:.85em" onmouseover="this.style.background='var(--bg-3)'" onmouseout="this.style.background=''">${f.icon||'⭐'} ${escH(f.name)}</div>`});
  if(folders.length===0)options='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:.85em">폴더가 없습니다.<br>먼저 위쪽 [+ 새 폴더]로 만드세요</div>';
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;background:var(--bg-1);border:2px solid #ebcb8b;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:10002';
  modal.innerHTML=`<div style="padding:10px 14px;border-bottom:1px solid var(--border);font-weight:600;color:#ebcb8b;display:flex;align-items:center;gap:8px"><span style="flex:1">⭐ 채팅을 어느 폴더에 저장?</span><span style="cursor:pointer;color:var(--text-muted)" onclick="this.parentElement.parentElement.remove()">✕</span></div><div style="padding:6px;max-height:300px;overflow-y:auto">${options}</div>`;
  document.body.appendChild(modal);
}
async function pickChatFavFolder(folderId,convId,el){
  const r=await api('POST','/api/fav/item/add',{folderId,kind:'conversation',targetId:convId});
  if(el&&el.closest('div').parentElement.parentElement)el.closest('div').parentElement.parentElement.remove();
  if(r.duplicate)alert('이미 그 폴더에 있는 대화입니다');
  else alert('✅ 즐겨찾기에 저장됨');
}

// 채팅 → 메모로 내보내기
async function exportChatToMemo(key){
  const state=panels.get(key);if(!state||!state.convId)return alert('아직 저장되지 않은 새 대화입니다');
  const r=await api('GET',`/api/conv/messages?convId=${state.convId}`);
  if(!r.ok||!r.messages||r.messages.length===0)return alert('대화 내용 없음');
  // 포맷팅
  const lines=[];
  lines.push(`# 채팅 내역 — ${state.nodeName}`);
  lines.push(`내보낸 시각: ${new Date().toISOString().substring(0,19).replace('T',' ')}`);
  lines.push(`대화 ID: ${state.convId}`);
  lines.push(`메시지 수: ${r.messages.length}`);
  lines.push('');
  lines.push('---');
  lines.push('');
  r.messages.forEach(m=>{
    const time=m.ts?new Date(m.ts).toLocaleString('ko-KR'):'';
    const mode=m.chat_only==1?'[💬 대화전용]':'[🔧 툴사용]';
    const role=m.role==='user'?'**🙋 USER**':'**🤖 CLAUDE**';
    lines.push(`${role} ${mode} *${time}*`);
    lines.push('');
    lines.push(m.content);
    lines.push('');
    lines.push('---');
    lines.push('');
  });
  const content=lines.join('\n');
  const today=new Date().toISOString().substring(0,10).replace(/-/g,'');
  const defaultName=`${today}_${state.nodeName}_채팅`;
  const name=prompt('메모 이름:',defaultName);
  if(!name)return;
  const sr=await api('POST','/api/memo/save',{name,content,is_temp:0});
  if(sr.ok){alert(`✅ 메모로 저장됨\n이름: ${name}\nID: ${sr.id}`)}else{alert('저장 실패')}
}

// 우클릭 분기
let ctxNodeId='',ctxNodeName='';
function showChatCtx(e,nodeId,nodeName){
  ctxNodeId=nodeId;ctxNodeName=nodeName;
  const m=document.getElementById('chat-ctx');
  m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.style.display='block';
}
document.addEventListener('click',()=>document.getElementById('chat-ctx').style.display='none');

async function chatFork(){
  document.getElementById('chat-ctx').style.display='none';
  if(!ctxNodeId)return;
  const r=await api('GET',`/api/exec/list?nodeId=${ctxNodeId}`);
  const execs=(r.ok&&r.executions)||[];
  const res=await api('POST','/api/chat/fork',{execId:execs[0]?execs[0].id:'',nodeId:ctxNodeId,nodeName:ctxNodeName});
  if(res.ok){
    await renderSidePanel();
    openChat(res.convId,ctxNodeId,ctxNodeName);
  }
}

// 페이지 떠나기 전 — 폴링 정리는 안 함 (서버는 알아서 저장)
window.addEventListener('beforeunload',()=>{
  savePanelList();
});

// 초기화
(async()=>{
  await renderSidePanel();
  loadChatFavBar();
  // 1) 캔버스에서 보낸 pending open_conv 처리
  try{
    const pending=JSON.parse(localStorage.getItem('open_conv'));
    if(pending&&pending.convId){
      localStorage.removeItem('open_conv');
      await openChat(pending.convId,pending.nodeId,pending.nodeName);
    }
  }catch(e){}
  // 2) 이전에 열려있던 패널들 복원 (응답 대기 중이었으면 폴링 재개)
  const saved=loadPanelList();
  for(const p of saved){
    if(!panels.has(p.convId)){
      await openChat(p.convId,p.nodeId,p.nodeName);
    }
  }
})();

// 주기적 노드 목록 갱신
setInterval(()=>renderSidePanel(),10000);
</script>
